<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log文件解析器 · IEC 104/101</title>
<style>
:root{--bg-primary:#f1f5f9;--bg-secondary:#ffffff;--bg-tertiary:#f8fafc;--text-primary:#0f172a;--text-secondary:#475569;--text-tertiary:#64748b;--border-color:#cbd5e1;--border-light:#e2e8f0;--hover-bg:#f1f5f9;--input-bg:#f8fafc;--accent-primary:#2563eb;--accent-secondary:#7c3aed;--success-bg:#f0fdf4;--warn-bg:#fffbeb;--danger-bg:#fef2f2;--panel-bg:#f8fafc;--error-bg:#fee2e2;--error-text:#b91c1c;--card-bg:#ffffff;--tag-bg:#e0f2fe;--tag-color:#1d4ed8;--tag-yc-bg:#fce7f3;--tag-yc-text:#9d174d;--tag-yx-bg:#d1fae5;--tag-yx-text:#065f46;--tag-ctrl-bg:#fef3c7;--tag-ctrl-text:#92400e;--tag-fault-bg:#fee2e2;--tag-fault-text:#991b1b;--tag-energy-bg:#ede9fe;--tag-energy-text:#4c1d95;--tag-total-bg:#e0f2fe;--tag-total-text:#0369a1;--tag-proto104-bg:#dbeafe;--tag-proto104-text:#1d4ed8;--tag-proto101-bg:#cffafe;--tag-proto101-text:#0e7490;--tag-link-bg:#f3f4f6;--tag-link-text:#374151;--tag-test-bg:#ecfdf5;--tag-test-text:#065f46;--tag-other-bg:#f3f4f6;--tag-other-text:#4b5563;--dir-tx-bg:#bfdbfe;--dir-tx-text:#1e40af;--dir-rx-bg:#bbf7d0;--dir-rx-text:#14532d;--row-bg:#eff6ff;--row-border:#e2e8f0;--success-text:#065f46;--warn-text:#92400e;--danger-text:#991b1b;--muted:#94a3b8;--link-text:#1d4ed8} @media (prefers-color-scheme:dark){:root{--bg-primary:#0f172a;--bg-secondary:#1e293b;--bg-tertiary:#334155;--text-primary:#f1f5f9;--text-secondary:#cbd5e1;--text-tertiary:#94a3b8;--border-color:#475569;--border-light:#334155;--hover-bg:#334155;--input-bg:#1e293b;--accent-primary:#60a5fa;--accent-secondary:#c084fc;--success-bg:#0f766e;--warn-bg:#92400e;--danger-bg:#881337;--panel-bg:#1e293b;--error-bg:#42181f;--error-text:#fda4af;--card-bg:#1e293b;--tag-bg:#1e293b;--tag-color:#93c5fd;--row-bg:#1e293b;--row-border:#334155;--success-text:#2dd4bf;--warn-text:#f59e0b;--danger-text:#fda4af;--muted:#94a3b8;--link-text:#93c5fd}}html.dark-theme{--bg-primary:#0f172a;--bg-secondary:#1e293b;--bg-tertiary:#334155;--text-primary:#f1f5f9;--text-secondary:#cbd5e1;--text-tertiary:#94a3b8;--border-color:#475569;--border-light:#334155;--hover-bg:#334155;--input-bg:#1e293b;--accent-primary:#60a5fa;--accent-secondary:#c084fc;--success-bg:#0f766e;--warn-bg:#92400e;--danger-bg:#881337;--panel-bg:#1e293b;--error-bg:#42181f;--error-text:#fda4af;--card-bg:#1e293b;--tag-bg:#1e293b;--tag-color:#93c5fd;--row-bg:#1e293b;--row-border:#334155;--success-text:#2dd4bf;--warn-text:#f59e0b;--danger-text:#fda4af;--muted:#94a3b8;--link-text:#93c5fd}html.light-theme{--bg-primary:#f1f5f9;--bg-secondary:#ffffff;--bg-tertiary:#f8fafc;--text-primary:#0f172a;--text-secondary:#475569;--text-tertiary:#64748b;--border-color:#cbd5e1;--border-light:#e2e8f0;--hover-bg:#f1f5f9;--input-bg:#f8fafc;--accent-primary:#2563eb;--accent-secondary:#7c3aed;--success-bg:#f0fdf4;--warn-bg:#fffbeb;--danger-bg:#fef2f2;--panel-bg:#f8fafc;--error-bg:#fee2e2;--error-text:#b91c1c;--card-bg:#ffffff;--tag-bg:#e0f2fe;--tag-color:#1d4ed8;--row-bg:#eff6ff;--row-border:#e2e8f0;--success-text:#065f46;--warn-text:#92400e;--danger-text:#991b1b;--muted:#94a3b8;--link-text:#1d4ed8}
*::-webkit-scrollbar{width:10px;height:10px}
*::-webkit-scrollbar-track{background:var(--bg-tertiary);border-radius:999px}
*::-webkit-scrollbar-thumb{background:var(--border-color);border-radius:999px;border:2px solid var(--bg-secondary)}
*::-webkit-scrollbar-thumb:hover{background:#94a3b8}
.titlebar{position:fixed;top:0;left:0;right:0;height:36px;display:flex;align-items:center;padding:0 10px;background:var(--bg-secondary);border-bottom:1px solid var(--border-light);-webkit-app-region:drag;z-index:999}
.titlebar .title{font-weight:700;color:var(--text-primary);user-select:none}
.titlebar .window-controls{margin-left:auto;display:flex;gap:4px}
.window-controls button{width:42px;height:30px;display:flex;align-items:center;justify-content:center;border:none;border-radius:6px;background:transparent;color:var(--text-secondary);font-size:.85rem;cursor:pointer;-webkit-app-region:no-drag}
.window-controls button:hover{background:var(--hover-bg)}
.window-controls .close:hover{background:#fee2e2;color:#dc2626}
html:not(.electron) .titlebar{display:none}
html:not(.electron) body{padding-top:20px}
*{box-sizing:border-box}
body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:var(--bg-primary);margin:0;padding:64px 20px 20px;min-height:100vh;color:var(--text-primary);transition:background-color .3s,color .3s}
.container{max-width:1700px;margin:0 auto;background:var(--bg-secondary);border-radius:20px;box-shadow:0 20px 40px -8px rgba(0,0,0,.12);padding:28px;transition:background-color .3s}

/* header */
h1{font-size:1.8rem;font-weight:700;margin:0 0 6px;color:var(--text-primary);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
h1 .badge{background:var(--accent-primary);color:white;font-size:.75rem;padding:3px 12px;border-radius:30px;font-weight:400}
h1 .badge-101{background:#0891b2}
h1 .badge-log{background:var(--accent-secondary)}
.theme-toggle{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border-radius:30px;border:1.5px solid var(--border-color);background:var(--input-bg);color:var(--text-primary);cursor:pointer;font-size:.9rem;transition:background .15s;margin-left:auto}
.theme-toggle:hover{background:var(--hover-bg)}
.nav-link{font-size:.85rem;color:var(--accent-primary);text-decoration:none;padding:5px 14px;border:1.5px solid var(--border-light);border-radius:20px;transition:background .15s;margin-left:8px;background:var(--panel-bg)}
.nav-link:hover{background:var(--hover-bg)}
.sub{color:var(--text-secondary);margin-bottom:12px;border-left:4px solid var(--accent-secondary);padding:6px 12px;background:var(--panel-bg);border-radius:0 8px 8px 0;font-size:.9rem;line-height:1.6}

/* DB bar */
.db-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px;padding:8px 12px;border:1.5px dashed var(--border-color);border-radius:12px;background:var(--input-bg);transition:border-color .2s,background .2s}
.db-bar.ok{border-style:solid;border-color:var(--success-text);background:var(--success-bg)}
.db-bar.err{border-color:var(--danger-text);background:var(--danger-bg)}
.db-label{font-size:.85rem;color:var(--text-tertiary);white-space:nowrap;display:flex;align-items:center;gap:6px}
.db-pill{font-size:.78rem;font-weight:600;padding:2px 10px;border-radius:20px;white-space:nowrap}
.db-pill.ok{background:var(--success-bg);color:var(--success-text)}
.db-pill.none{background:var(--input-bg);color:var(--text-tertiary)}
.db-pill.err{background:var(--danger-bg);color:var(--error-text)}
.db-pill.loading{background:var(--warn-bg);color:var(--text-tertiary)}
.db-file-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:30px;font-size:.83rem;font-weight:500;cursor:pointer;border:1.5px solid var(--border-color);background:var(--bg-secondary);color:var(--text-secondary);transition:background .15s}
.db-file-btn:hover{background:var(--hover-bg)}
.db-detail{font-size:.75rem;color:var(--text-tertiary);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.db-clear{display:none;align-items:center;gap:4px;padding:4px 11px;border-radius:30px;font-size:.78rem;cursor:pointer;border:1.5px solid var(--danger-text);background:var(--danger-bg);color:var(--danger-text)}
.db-bar.ok .db-clear{display:inline-flex}
.db-bar.ok .db-file-btn{display:none}
.table-sel-wrap{display:none;align-items:center;gap:6px;border-left:1.5px solid var(--success-bg);padding-left:10px}
.db-bar.ok .table-sel-wrap{display:flex}
.table-sel-label{font-size:.8rem;color:var(--success-text);white-space:nowrap;font-weight:500}
#tableSelect{padding:4px 10px;border-radius:8px;font-size:.82rem;border:1.5px solid var(--success-bg);background:var(--input-bg);color:var(--text-primary);cursor:pointer;outline:none}

/* controls */
.ctrl-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:5px}
.log-drop-zone{border:2px dashed var(--border-color);border-radius:12px;padding:16px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;background:var(--panel-bg);flex:1;min-width:260px}
.log-drop-zone.drag{border-color:var(--accent-primary);background:var(--row-bg)}
.log-drop-zone.has-file{border-color:var(--success-bg);background:var(--success-bg)}
.log-drop-icon{font-size:2rem;margin-bottom:6px}
.log-drop-label{font-size:.9rem;color:var(--text-secondary)}
.log-drop-name{font-size:.82rem;color:var(--success-text);font-weight:600;margin-top:4px}
#logFileInput{display:none}
.proto-sel-box{display:flex;flex-direction:column;gap:6px;padding:10px 12px;border:1.5px solid var(--border-light);border-radius:12px;background:var(--panel-bg);min-width:200px}
.proto-sel-title{font-size:.8rem;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.4px}
.log-input-box{flex:1;display:flex;flex-direction:column;gap:6px;padding:8px 12px;border:1.5px solid var(--border-light);border-radius:12px;background:var(--panel-bg)}
.log-input-title{font-size:.8rem;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.4px}
#logInput{width:100%;flex:1;min-height:300px;padding:8px;border:1px solid var(--border-color);border-radius:6px;font-family:monospace;font-size:.8rem;resize:vertical;background:var(--input-bg);color:var(--text-primary);outline:none;transition:border .2s}
#logInput:focus{border-color:var(--accent-primary);}

.radio-group{display:flex;flex-direction:column;gap:4px}
.radio-group label{display:flex;align-items:center;gap:6px;font-size:.85rem;color:var(--text-secondary);cursor:pointer}
.radio-group input{cursor:pointer;accent-color:var(--accent-primary)}

.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 20px;border-radius:40px;font-size:.95rem;font-weight:500;cursor:pointer;border:1.5px solid transparent;transition:background .15s,transform .1s}
.btn:hover{transform:translateY(-1px)}
.btn-primary{background:var(--accent-secondary);color:white;border-color:var(--accent-secondary);box-shadow:0 4px 8px -2px rgba(124,58,237,.3)}
.btn-primary:hover{background:#6d28d9}
.btn-ghost{background:var(--bg-secondary);color:var(--text-secondary);border-color:var(--border-color)}
.btn-ghost:hover{background:var(--hover-bg)}
.btn-green{background:#059669;color:white;border-color:#059669;box-shadow:0 4px 8px -2px rgba(5,150,105,.25)}
.btn-green:hover{background:#047857}
.btn-group{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* stats bar */
.stats-bar{display:none;flex-wrap:wrap;gap:8px;margin-bottom:10px;padding:8px 12px;background:var(--input-bg);border:1.5px solid var(--border-light);border-radius:12px}
.stats-bar.visible{display:flex}
.stat-pill{font-size:.78rem;font-weight:600;padding:3px 10px;border-radius:20px;background:var(--bg-tertiary);color:var(--text-secondary)}
.stat-pill.yc{background:var(--tag-yc-bg);color:var(--tag-yc-text)}
.stat-pill.yx{background:var(--tag-yx-bg);color:var(--tag-yx-text)}
.stat-pill.ctrl{background:var(--tag-ctrl-bg);color:var(--tag-ctrl-text)}
.stat-pill.fault{background:var(--tag-fault-bg);color:var(--tag-fault-text)}
.stat-pill.energy{background:var(--tag-energy-bg);color:var(--tag-energy-text)}
.stat-pill.lines{background:var(--tag-total-bg);color:var(--tag-total-text)}
.stat-pill.proto104{background:var(--tag-proto104-bg);color:var(--tag-proto104-text)}
.stat-pill.proto101{background:var(--tag-proto101-bg);color:var(--tag-proto101-text)}

/* output */
.output{margin-top:4px}
.line-block{margin-bottom:2px}
.debug-line{font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--text-tertiary);padding:3px 10px;background:var(--input-bg);border-left:3px solid var(--border-color);white-space:pre-wrap;word-break:break-all}
.hex-block{border:1.5px solid var(--border-light);border-radius:10px;overflow:hidden;margin-bottom:6px}
.hex-header{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--input-bg);border-bottom:1px solid var(--border-light);cursor:pointer;user-select:none;transition:background .15s}
.hex-header:hover{background:var(--hover-bg)}
.hex-raw{font-family:'JetBrains Mono',monospace;font-size:.74rem;color:var(--text-secondary);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hex-raw span{color:var(--text-tertiary)}
.frame-summary{font-size:.78rem;color:var(--text-tertiary);margin-left:8px;flex-shrink:0}
.empty-frame-hint{font-size:.78rem;color:var(--text-tertiary);padding:8px}
.frame-error{background:var(--error-bg);color:var(--error-text);padding:6px 12px;border-radius:6px;font-size:.8rem;margin-bottom:4px}
.frame-json{font-family:monospace;font-size:.75rem;color:var(--text-secondary);padding:8px;background:var(--input-bg);white-space:pre-wrap}
.frame-count{color:var(--text-tertiary);font-weight:400}
.frame-block-header{font-weight:600;font-size:.8rem;color:var(--text-primary);padding:6px 10px;background:var(--row-bg)}
.link-frame{font-family:monospace;font-size:.75rem;color:var(--text-primary);padding:8px 12px;background:var(--input-bg)}
.hex-chevron{font-size:.8rem;color:var(--text-tertiary);transition:transform .2s;flex-shrink:0}
.hex-block.collapsed .hex-chevron{transform:rotate(-90deg)}
.hex-body{overflow:hidden;transition:max-height .25s ease}
.hex-block.collapsed .hex-body{max-height:0!important}
.frames-wrap{padding:8px 12px;background:var(--bg-secondary)}

/* proto badges */
.proto-104{display:inline-block;font-size:.68rem;font-weight:700;background:var(--tag-proto104-bg);color:var(--tag-proto104-text);padding:1px 7px;border-radius:4px;margin-right:4px;vertical-align:middle;white-space:nowrap}
.proto-101{display:inline-block;font-size:.68rem;font-weight:700;background:var(--tag-proto101-bg);color:var(--tag-proto101-text);padding:1px 7px;border-radius:4px;margin-right:4px;vertical-align:middle;white-space:nowrap}

/* frame cards */
.frame-card{border-radius:8px;overflow:hidden;margin-bottom:6px;border:1px solid var(--border-light)}
.frame-card-head{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;background:var(--panel-bg);cursor:pointer;user-select:none;font-size:.82rem;font-weight:600;color:var(--text-primary);border-bottom:1px solid var(--border-light)}
.frame-card-head:hover{background:var(--hover-bg)}
.frame-card.collapsed .hex-chevron{transform:rotate(-90deg)}
.frame-card-body{overflow:hidden;transition:max-height .2s ease}
.frame-card.collapsed .frame-card-body{max-height:0!important}
.frame-table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.83rem}
th{background:var(--input-bg);color:var(--text-secondary);font-weight:600;font-size:.72rem;text-transform:uppercase;letter-spacing:.3px;padding:8px 10px;border-bottom:1.5px solid var(--border-color);white-space:nowrap}
td{padding:7px 10px;border-bottom:1px solid var(--border-light);color:var(--text-primary)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--row-bg)}
.mono{font-family:'JetBrains Mono',monospace;background:var(--input-bg);padding:1px 5px;border-radius:4px;font-size:.79rem}
.pname{color:var(--success-text);font-weight:600;font-size:.8rem}
.pname-none{color:var(--border-color);font-size:.75rem}

/* type colors */
.tag-yc{background:var(--tag-yc-bg);color:var(--tag-yc-text);font-size:.68rem;font-weight:700;padding:1px 6px;border-radius:4px;display:inline-block}
.tag-yx{background:var(--tag-yx-bg);color:var(--tag-yx-text);font-size:.68rem;font-weight:700;padding:1px 6px;border-radius:4px;display:inline-block}
.tag-ctrl{background:#fef3c7;color:#92400e;font-size:.68rem;font-weight:700;padding:1px 6px;border-radius:4px;display:inline-block}
.tag-fault{background:#fee2e2;color:#991b1b;font-size:.68rem;font-weight:700;padding:1px 6px;border-radius:4px;display:inline-block}
.tag-energy{background:#ede9fe;color:#4c1d95;font-size:.68rem;font-weight:700;padding:1px 6px;border-radius:4px;display:inline-block}
.tag-clock{background:#fef3c7;color:#92400e;font-size:.68rem;font-weight:700;padding:1px 6px;border-radius:4px;display:inline-block}
.tag-total{background:#e0f2fe;color:#0369a1;font-size:.68rem;font-weight:700;padding:1px 6px;border-radius:4px;display:inline-block}
.tag-link{background:#f3f4f6;color:#374151;font-size:.68rem;font-weight:700;padding:1px 6px;border-radius:4px;display:inline-block}
.tag-test{background:#ecfdf5;color:#065f46;font-size:.68rem;font-weight:700;padding:1px 6px;border-radius:4px;display:inline-block}
.tag-other{background:#f3f4f6;color:#4b5563;font-size:.68rem;font-weight:700;padding:1px 6px;border-radius:4px;display:inline-block}

/* dir badge */
.dir-tx{background:#bfdbfe;color:#1e40af;font-size:.68rem;font-weight:700;padding:1px 6px;border-radius:4px;display:inline-block}
.dir-rx{background:#bbf7d0;color:#14532d;font-size:.68rem;font-weight:700;padding:1px 6px;border-radius:4px;display:inline-block}

.empty-hint{text-align:center;color:var(--muted);font-style:italic;padding:40px 0;font-size:.9rem}
.error-msg{background:var(--error-bg);color:var(--error-text);padding:8px 12px;border-radius:10px;margin-bottom:10px;border:1px solid var(--danger-bg);font-size:.85rem}
.col-name{display:none}
body.has-db .col-name{display:table-cell}

/* ── 时间高亮 ── */
.time-hl{
  background:#fef9c3;
  color:#854d0e;
  border-radius:3px;
  padding:0 3px 1px;
  font-weight:700;
  font-family:'JetBrains Mono',monospace;
  font-size:.77rem;
  letter-spacing:.01em;
}
html.dark-theme .time-hl{background:#451a03;color:#fcd34d;border:1px solid #78350f}

/* ── 过滤调试信息 Toggle ── */
.log-input-title-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
}
.filter-toggle-wrap{
  display:flex;
  align-items:center;
  gap:7px;
  flex-shrink:0;
}
.filter-toggle-label{
  font-size:.78rem;
  color:var(--text-tertiary);
  font-weight:500;
  cursor:pointer;
  user-select:none;
  white-space:nowrap;
  transition:color .2s;
}
.filter-toggle-label.active{color:var(--accent-primary)}
/* Toggle switch */
.toggle-switch{
  position:relative;
  width:38px;
  height:22px;
  flex-shrink:0;
  cursor:pointer;
}
.toggle-switch input{
  opacity:0;
  width:0;
  height:0;
  position:absolute;
}
.toggle-track{
  position:absolute;
  inset:0;
  background:var(--border-color);
  border-radius:22px;
  transition:background .25s cubic-bezier(.4,0,.2,1);
  cursor:pointer;
}
.toggle-switch input:checked + .toggle-track{
  background:var(--accent-primary);
}
.toggle-thumb{
  position:absolute;
  top:3px;
  left:3px;
  width:16px;
  height:16px;
  background:#fff;
  border-radius:50%;
  transition:transform .25s cubic-bezier(.4,0,.2,1);
  box-shadow:0 1px 4px rgba(0,0,0,.25);
  pointer-events:none;
}
.toggle-switch input:checked ~ .toggle-thumb{
  transform:translateX(16px);
}
</style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
<div class="titlebar">
    <div class="title">IEC104Parser</div>
    <div class="window-controls">
        <button id="min-btn" aria-label="最小化">─</button>
        <button id="max-btn" aria-label="最大化">▢</button>
        <button id="close-btn" class="close" aria-label="关闭">✕</button>
    </div>
</div>
<div class="container">
  <h1>📄 Log 文件解析器 <span class="badge">104</span><span class="badge badge-101">101</span><span class="badge badge-log">LOG</span>
    <button id="themeToggle" class="theme-toggle" style="margin-left:auto">🌙 暗色</button>
    <a href="/" class="nav-link">← 返回实时解析</a>
  </h1>
  <div class="sub">
    上传 log 文件后自动逐行解析，保留原始调试信息，识别 <code>Tx/Rx</code> 帧并解析 101/104 协议内容。

<script>
// ─── SQL.js 初始化 ─────────────────────────────────────────
let SQL = null;
let sqlReady = false;
let sqlLoadPromise = null;
let sqlRetries = 0;
const MAX_RETRIES = 3;

function initSQL() {
  if (sqlReady && SQL) return Promise.resolve(SQL);
  if (sqlLoadPromise) return sqlLoadPromise;
  sqlLoadPromise = new Promise((resolve, reject) => {
    if (typeof initSqlJs === 'undefined') {
      setTimeout(() => {
        if (typeof initSqlJs === 'undefined') {
          reject(new Error('initSqlJs 未定义 - sql.js 库加载失败'));
        } else {
          sqlLoadPromise = null;
          initSQL().then(resolve).catch(reject);
        }
      }, 500);
      return;
    }
    initSqlJs({ locateFile: (file) => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/${file}` })
    .then(sql => { SQL = sql; sqlReady = true; sqlRetries = 0; resolve(sql); })
    .catch(err => {
      sqlLoadPromise = null;
      if (sqlRetries < MAX_RETRIES) {
        sqlRetries++;
        setTimeout(() => initSQL().then(resolve).catch(reject), 3000);
      } else {
        reject(new Error(`sql.js 加载失败，已重试 ${MAX_RETRIES} 次：${err.message}`));
      }
    });
  });
  return sqlLoadPromise;
}

initSQL().catch(e => console.warn('⚠️ 后台加载失败: ' + e.message));

// ─── State ─────────────────────────────────────────────────
let logText = '';
let logFileName = '';
let dbData = null;
let parseResult = null;

const PT = {
  switchYXPoint : new Map(),
  switchYCPoint : new Map(),
  switchYKPoint : new Map(),
  switchENPoint : new Map(),
  addrToSwitchYX : new Map(),  // 101转发：Addr → SwitchName
  addrToSwitchYC : new Map(),
  addrToSwitchYK : new Map(),
  addrToSwitchEN : new Map(),
  allYXPoint : new Map(),
  allYCPoint : new Map(),
  allYKPoint : new Map(),
  allENPoint : new Map(),
  maps : { para: new Map() },
  raw : { yc:[], yx:[], yk:[], en:[], para:[] },
  tableNames : [],
  curTable : null,
  ok : false,
  follow101Transfer : false
};

function rebuildPointMaps(tableName) {
    PT.curTable = tableName;
    const isTransfer = (tableName !== null && tableName !== '全点表');

    // 全量 Addr→Name（不过滤TableName，供101无转发时使用）
    const buildAllMap = (rows) => {
        const m = new Map();
        for (const r of rows) {
            const key  = r.Addr != null ? Number(r.Addr) : null;
            const name = r.Name ? String(r.Name).trim() : '';
            if (key != null && key > 0 && name) m.set(key, name);
        }
        return m;
    };

    // 104用：转发表 SwitchPoint→SwitchName，全点表 Addr→Name
    const buildSwitchMap = (rows) => {
        const m = new Map();
        for (const r of rows) {
            if (isTransfer && (r.TableName ?? null) !== tableName) continue;
            const key  = isTransfer
                ? (r.SwitchPoint != null ? Number(r.SwitchPoint) : null)
                : (r.Addr        != null ? Number(r.Addr)        : null);
            const name = isTransfer
                ? (r.SwitchName ? String(r.SwitchName).trim() : '')
                : (r.Name       ? String(r.Name).trim()       : '');
            if (key != null && key > 0 && name) m.set(key, name);
        }
        return m;
    };

    // 101转发用：Addr→SwitchName（只取选定转发表的行）
    const buildAddrToSwitch = (rows) => {
        const m = new Map();
        if (!isTransfer) return m;
        for (const r of rows) {
            if ((r.TableName ?? null) !== tableName) continue;
            const key  = r.Addr != null ? Number(r.Addr) : null;
            const name = r.SwitchName ? String(r.SwitchName).trim() : '';
            if (key != null && key > 0 && name) m.set(key, name);
        }
        return m;
    };

    PT.allYXPoint = buildAllMap(PT.raw.yx);
    PT.allYCPoint = buildAllMap(PT.raw.yc);
    PT.allYKPoint = buildAllMap(PT.raw.yk);
    PT.allENPoint = buildAllMap(PT.raw.en);

    PT.switchYXPoint = buildSwitchMap(PT.raw.yx);
    PT.switchYCPoint = buildSwitchMap(PT.raw.yc);
    PT.switchYKPoint = buildSwitchMap(PT.raw.yk);
    PT.switchENPoint = buildSwitchMap(PT.raw.en);

    PT.addrToSwitchYX = buildAddrToSwitch(PT.raw.yx);
    PT.addrToSwitchYC = buildAddrToSwitch(PT.raw.yc);
    PT.addrToSwitchYK = buildAddrToSwitch(PT.raw.yk);
    PT.addrToSwitchEN = buildAddrToSwitch(PT.raw.en);

    PT.maps.para = new Map();
    for (const r of PT.raw.para) if (r.UpAddr) PT.maps.para.set(Number(r.UpAddr), String(r.Name ?? '').trim());
    PT.ok = true;
}

// ─── DB Loading ────────────────────────────────────────────
document.getElementById('dbFileInput').addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return;
  loadDB(f);
});

function loadDB(file) {
  const bar = document.getElementById('dbBar');
  const pill = document.getElementById('dbPill');
  const detail = document.getElementById('dbDetail');
  const ext = file.name.toLowerCase().split('.').pop();
  if (ext === 'db' || ext === 'sqlite' || ext === 'sqlite3') {
    pill.className = 'db-pill loading'; pill.textContent = '初始化...';
    detail.textContent = '正在加载 sql.js 库...';
    bar.className = 'db-bar loading';
  } else {
    pill.className = 'db-pill loading'; pill.textContent = '加载中...';
    bar.className = 'db-bar loading';
  }
  const reader = new FileReader();
  reader.onerror = (e) => {
    pill.className = 'db-pill err'; pill.textContent = '读取失败';
    bar.className = 'db-bar err';
    detail.textContent = '无法读取文件：' + (e?.message || e);
  };
  reader.onload = async (ev) => {
    try {
      if (ext === 'db' || ext === 'sqlite' || ext === 'sqlite3') {
        pill.textContent = '正在加载 sql.js...';
        detail.textContent = '此过程需要几秒钟，请稍候...';
        let sql;
        try { sql = await initSQL(); pill.textContent = '解析中...'; detail.textContent = '正在解析数据库结构...'; }
        catch (sqlErr) { throw new Error('sql.js 库加载失败：' + sqlErr.message); }
        try {
          const data = new Uint8Array(ev.target.result);
          const db = new sql.Database(data);
          const readTable = (sqlStr) => {
            try {
              const stmt = db.prepare(sqlStr);
              const rows = [];
              while (stmt.step()) rows.push(stmt.getAsObject());
              stmt.free(); return rows;
            } catch(e) { return []; }
          };
          PT.raw = { yc:[], yx:[], yk:[], en:[], para:[] };
          PT.raw.yc   = readTable('SELECT Addr, BoardPoint, Name, SwitchPoint, SwitchName, TableName FROM ProjectYcPoint   ORDER BY Addr');
          PT.raw.yx   = readTable('SELECT Addr, BoardPoint, Name, SwitchPoint, SwitchName, TableName FROM ProjectYxPoint   ORDER BY Addr');
          PT.raw.yk   = readTable('SELECT Addr, BoardPoint, Name, SwitchPoint, SwitchName, TableName FROM ProjectYkPoint   ORDER BY Addr');
          PT.raw.en   = readTable('SELECT Addr, Name, SwitchPoint, SwitchName, TableName FROM ProjectEnergyPoint ORDER BY Addr');
          PT.raw.para = readTable('SELECT UpAddr, Name, TableName FROM ProjectParaTransferPoint');
          db.close();
          const tnSet = new Set();
          for (const arr of [PT.raw.yc, PT.raw.yx, PT.raw.yk, PT.raw.en])
              for (const r of arr) { const tn = r.TableName; if (tn === undefined) continue; tnSet.add(tn ?? null); }
          PT.tableNames = [...tnSet].sort((a,b) => {
              if (a == null && b == null) return 0; if (a == null) return 1; if (b == null) return -1;
              return String(a).localeCompare(String(b), 'zh');
          });
          populateTableSelect(PT.tableNames);
          const defaultName = PT.tableNames.includes('入网检') ? '入网检' : (PT.tableNames.find(t => t !== null) ?? null);
          if (defaultName) { const sel = document.getElementById('tableSelect'); if (sel) sel.value = defaultName; }
          rebuildPointMaps(defaultName);
          onDBLoaded(file.name, null);
        } catch (sqlErr) { throw new Error('数据库解析失败：' + (sqlErr?.message || sqlErr)); }
        return;
      }
      const json = JSON.parse(ev.target.result);
      if (json.tables || json.yc || json.yx) {
        dbData = normalizeDB(json); onDBLoaded(file.name, dbData);
      } else { throw new Error('未识别的格式，需要包含 yc、yx 或 tables 字段'); }
    } catch(ex) {
      pill.className = 'db-pill err'; pill.textContent = '格式错误';
      bar.className = 'db-bar err'; detail.textContent = ex.message;
    }
  };
  if (ext === 'db' || ext === 'sqlite' || ext === 'sqlite3') reader.readAsArrayBuffer(file);
  else reader.readAsText(file, 'utf-8');
}

function normalizeDB(raw) {
  const out = { yc:{}, yx:{}, yk:{}, en:{}, para:{}, tableNames:[] };
  if (raw.tables) {
    out.tableNames = Object.keys(raw.tables);
    populateTableSelect(out.tableNames);
    for (const tname of out.tableNames) {
      const t = raw.tables[tname];
      for (const type of ['yc','yx','yk','en','para']) {
        if (Array.isArray(t[type])) t[type].forEach(({addr, name}) => { if (addr != null) out[type][addr] = name; });
        else if (t[type] && typeof t[type] === 'object') Object.assign(out[type], t[type]);
      }
    }
    out._raw = raw;
  } else {
    for (const type of ['yc','yx','yk','en','para']) {
      if (Array.isArray(raw[type])) raw[type].forEach(({addr, name}) => { if (addr != null) out[type][addr] = name; });
      else if (raw[type] && typeof raw[type] === 'object') Object.assign(out[type], raw[type]);
    }
  }
  return out;
}

function populateTableSelect(names) {
  const sel = document.getElementById('tableSelect');
  sel.innerHTML = '<option value="">全点表（101默认）</option>';
  names.forEach(n => { const opt = document.createElement('option'); opt.value = n; opt.textContent = n; sel.appendChild(opt); });
  sel.onchange = () => {
    const tname = sel.value;
    const tableName = (tname === '__null__' || tname === '') ? null : tname;
    rebuildPointMaps(tableName);
    if (parseResult) renderResult(parseResult);
  };
}

function applyTableSelect() {
  const sel = document.getElementById('tableSelect');
  if (!sel) return;
  const tname = sel.value;
  const tableName = (tname === '__null__' || tname === '') ? null : tname;
  rebuildPointMaps(tableName);
  if (parseResult) renderResult(parseResult);
}
document.getElementById('tableSelect').addEventListener('change', applyTableSelect);

function onDBLoaded(name, db) {
  const bar = document.getElementById('dbBar');
  const pill = document.getElementById('dbPill');
  const detail = document.getElementById('dbDetail');
  const ycN = PT.raw.yc.length, yxN = PT.raw.yx.length, ykN = PT.raw.yk.length;
  const totalPoints = ycN + yxN + ykN;
  pill.className = 'db-pill ok'; pill.textContent = `已加载 ${totalPoints} 点`;
  bar.className = 'db-bar ok';
  detail.textContent = `${name}  遥测:${ycN} 遥信:${yxN} 遥控:${ykN}`;
  document.body.classList.add('has-db');
  const dbInput = document.getElementById('dbFileInput'); if (dbInput) dbInput.value = '';
  if (parseResult) renderResult(parseResult);
}

function clearDB() {
  dbData = null; PT.ok = false; PT.curTable = null; PT.tableNames = [];
  PT.raw = { yc:[], yx:[], yk:[], en:[], para:[] };
  const bar = document.getElementById('dbBar');
  const pill = document.getElementById('dbPill');
  const detail = document.getElementById('dbDetail');
  bar.className = 'db-bar';
  pill.className = 'db-pill none'; pill.textContent = '未加载';
  detail.textContent = '';
  document.getElementById('tableSelect').innerHTML = '<option value="">全点表（101默认）</option>';
  const dbInput2 = document.getElementById('dbFileInput'); if (dbInput2) dbInput2.value = '';
  document.body.classList.remove('has-db');
  if (parseResult) renderResult(parseResult);
}

// ─── Log File Loading ───────────────────────────────────────
const dropZone = document.getElementById('dropZone');
const logFileInput = document.getElementById('logFileInput');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag');
  const f = e.dataTransfer.files[0]; if (f) loadLogFile(f);
});
logFileInput.addEventListener('change', e => { const f = e.target.files[0]; if (f) loadLogFile(f); });

function loadLogFile(file) {
  logFileName = file.name;
  const reader = new FileReader();
  reader.onload = ev => {
    logText = ev.target.result;
    dropZone.classList.add('has-file');
    document.getElementById('dropIcon').textContent = '✅';
    document.getElementById('dropLabel').textContent = '已加载文件';
    document.getElementById('dropName').textContent = `${file.name}  (${(file.size/1024).toFixed(1)} KB)`;
    document.getElementById('parseBtn').disabled = false;
    checkParseEnable();
  };
  reader.readAsText(file, 'utf-8');
}

function checkParseEnable() {
  const inputText = document.getElementById('logInput').value.trim();
  const hasFile = logText.length > 0;
  document.getElementById('parseBtn').disabled = !(inputText || hasFile);
}

// ─── Parse ─────────────────────────────────────────────────
async function parseLog() {
  const inputText = document.getElementById('logInput').value.trim();
  const useInput = inputText.length > 0;
  const textToParse = useInput ? inputText : logText;
  if (!textToParse) return;
  const btn = document.getElementById('parseBtn');
  const status = document.getElementById('parseStatus');
  btn.disabled = true; btn.textContent = '⏳ 解析中...';
  status.textContent = '';
  document.getElementById('errorBox').style.display = 'none';
  const proto = document.querySelector('input[name="proto"]:checked').value;
  try {
    const resp = await fetch('/parseLog', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ logText: textToParse, forceProtocol: proto === 'auto' ? undefined : proto })
    });
    if (!resp.ok) throw new Error(`Server error ${resp.status}`);
    parseResult = await resp.json();
    renderResult(parseResult);
    document.getElementById('downloadBtn').disabled = false;
    status.textContent = `✓ 解析完成 ${parseResult.lines.length} 行`;
    setDefaultTableBasedOnProtocol(parseResult);
  } catch(e) {
    document.getElementById('errorBox').textContent = '解析失败：' + e.message;
    document.getElementById('errorBox').style.display = 'block';
  } finally {
    btn.disabled = false; btn.textContent = '▶ 解析 Log';
  }
}

// ─── Time Highlight ──────────────────────────────────────────
/**
 * 在已转义的字符串中，给时间戳加高亮 span。
 * 匹配格式：
 *   YYYY/MM/DD-HH:MM:SS  （如 2026/03/19-08:49:05）
 *   YYYY-MM-DD HH:MM:SS
 *   HH:MM:SS.mmm
 */
function highlightTime(escapedStr) {
  return escapedStr.replace(
    /(\d{4}[\/\-]\d{2}[\/\-]\d{2}[-\s]\d{2}:\d{2}:\d{2}(?:[.,]\d+)?|\d{2}:\d{2}:\d{2}(?:[.,]\d+)?)/g,
    '<span class="time-hl">$1</span>'
  );
}

// ─── Filter Debug Lines ───────────────────────────────────────
function applyDebugFilter() {
  const on = document.getElementById('filterDebugToggle').checked;
  const label = document.getElementById('filterLabel');
  // Update label active state
  label.classList.toggle('active', on);
  // Show/hide all debug lines
  document.querySelectorAll('#output .debug-line').forEach(el => {
    el.style.display = on ? 'none' : '';
  });
}

// ─── Render ─────────────────────────────────────────────────
function ptName(type, addr, proto) {
  if (!PT.ok) return '';
  const n = Number(addr);
  if (Number.isNaN(n)) return '';
  const is101 = String(proto || '').trim() === '101';
  const isTransfer = PT.curTable !== null && PT.curTable !== '全点表';

  if (is101) {
    // 101：IOA 直接等于 Addr，无偏移
    // 转发开启且选了转发表时查 addrToSwitch（Addr→SwitchName），否则查 allXXPoint（Addr→Name）
    const useTransfer = PT.follow101Transfer && isTransfer;
    switch (type) {
      case 'yx': return (useTransfer ? PT.addrToSwitchYX : PT.allYXPoint).get(n) ?? '';
      case 'yc': return (useTransfer ? PT.addrToSwitchYC : PT.allYCPoint).get(n) ?? '';
      case 'yk': return (useTransfer ? PT.addrToSwitchYK : PT.allYKPoint).get(n) ?? '';
      case 'en': return (useTransfer ? PT.addrToSwitchEN : PT.allENPoint).get(n) ?? '';
      case 'para': return PT.maps.para.get(n) ?? '';
      default: return '';
    }
  }

  // 104：转发表有偏移，全点表直接用 Addr
  switch (type) {
    case 'yx': return PT.switchYXPoint.get(n)                          ?? PT.allYXPoint.get(n) ?? '';
    case 'yc': return PT.switchYCPoint.get(isTransfer ? n - 0x4000 : n) ?? PT.allYCPoint.get(n) ?? '';
    case 'yk': return PT.switchYKPoint.get(isTransfer ? n - 0x6000 : n) ?? PT.allYKPoint.get(n) ?? '';
    case 'en': return PT.switchENPoint.get(isTransfer ? n - 0x6400 : n) ?? PT.allENPoint.get(n) ?? '';
    case 'para': return PT.maps.para.get(n) ?? '';
    default: return '';
  }
}

function apply101FollowToggle() {
  PT.follow101Transfer = document.getElementById('follow101Toggle').checked;
  const sel = document.getElementById('tableSelect');
  // 开启转发时，若未选表则自动选第一个具名表
  if (PT.follow101Transfer && sel && !sel.value && PT.tableNames.length) {
    const firstTable = PT.tableNames.find(t => t !== null);
    if (firstTable) sel.value = firstTable;
  }
  // 无论如何都重建 maps，确保 isTransfer 逻辑与当前选表一致
  const tname = sel ? sel.value : '';
  rebuildPointMaps(tname === '__null__' || tname === '' ? null : tname);
  if (parseResult) renderResult(parseResult);
}
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function addrHex(addr, proto) {
  if (addr == null) return '';
  const n = parseInt(addr, 10);
  if (isNaN(n)) return esc(String(addr));
  return proto === '101'
    ? '0x' + n.toString(16).padStart(4,'0').toUpperCase()
    : '0x' + n.toString(16).padStart(6,'0').toUpperCase();
}

function protoBadge(p) {
  return p === '101'
    ? '<span class="proto-101">101</span>'
    : '<span class="proto-104">104</span>';
}

function dirBadge(prefix) {
  if (!prefix) return '';
  if (/Tx/i.test(prefix)) return '<span class="dir-tx">Tx</span>';
  if (/Rx/i.test(prefix)) return '<span class="dir-rx">Rx</span>';
  return '';
}

function typeTag(type) {
  const map = {
    yc:'遥测',yx:'遥信',soe:'SOE',control:'遥控',param:'定值',
    energy:'电能',fault:'故障',clock:'对时',total_call:'总召',
    link_frame:'链路帧',heartbeat:'心跳',init:'初始化',
    file:'文件',reset:'复位',test:'测试'
  };
  const label = map[type] || type || '?';
  const cls = {
    yc:'yc',yx:'yx',soe:'yx',control:'ctrl',param:'ctrl',
    energy:'energy',fault:'fault',clock:'clock',total_call:'total',
    link_frame:'link',heartbeat:'test',init:'total',
    file:'other',reset:'other',test:'test'
  }[type] || 'other';
  return `<span class="tag-${cls}">${esc(label)}</span>`;
}

function renderResult(result) {
  const lines = result.lines || [];
  const out = document.getElementById('output');

  let nHex=0,nDbg=0,n104=0,n101=0,nYC=0,nYX=0,nCtrl=0,nFault=0,nEnergy=0;
  lines.forEach(l => {
    if (l.type === 'hex') {
      nHex++;
      if (l.protocol === '104') n104++; else n101++;
      (l.frames||[]).forEach(f => {
        if (f.type === 'yc') nYC += (f.data||[]).length;
        if (f.type === 'yx' || f.type === 'soe') nYX += (f.data||[]).length;
        if (f.type === 'control') nCtrl += (f.data||[]).length;
        if (f.type === 'fault') nFault++;
        if (f.type === 'energy') nEnergy += (f.data||[]).length;
      });
    } else if (l.type !== 'empty') nDbg++;
  });

  const statsBar = document.getElementById('statsBar');
  statsBar.className = 'stats-bar visible';
  statsBar.innerHTML = `
    <span class="stat-pill lines">总行 ${lines.length}</span>
    <span class="stat-pill proto104">帧 ${nHex} 条</span>
    <span class="stat-pill proto104">104×${n104}</span>
    <span class="stat-pill proto101">101×${n101}</span>
    <span class="stat-pill yc">遥测 ${nYC}</span>
    <span class="stat-pill yx">遥信 ${nYX}</span>
    <span class="stat-pill ctrl">遥控 ${nCtrl}</span>
    <span class="stat-pill fault">故障 ${nFault}</span>
    <span class="stat-pill energy">电能 ${nEnergy}</span>
  `;

  const html = [];
  lines.forEach((line, idx) => {
    if (line.type === 'empty') return;
    if (line.type === 'debug') {
      // 对 raw 先转义，再高亮时间
      html.push(`<div class="debug-line">${highlightTime(esc(line.raw))}</div>`);
      return;
    }
    if (line.type === 'hex') {
      const pb = protoBadge(line.protocol);
      const db = dirBadge(line.prefix);
      const framesSummary = summarizeFrames(line.frames||[]);
      const id = `hb${idx}`;
      html.push(`
      <div class="hex-block" id="${id}">
        <div class="hex-header" onclick="toggleBlock('${id}')">
          ${db}${pb}
          <span class="hex-raw">${highlightTime(esc(line.prefix||''))} <span class="frame-summary">${esc(line.hexStr||'')}</span></span>
          <span class="frame-summary">${framesSummary}</span>
          <span class="hex-chevron">▾</span>
        </div>
        <div class="hex-body" style="max-height:2000px">
          <div class="frames-wrap">${renderFrames(line.frames||[], line.protocol)}</div>
        </div>
      </div>`);
      return;
    }
  });

  out.innerHTML = html.join('') || '<div class="empty-hint">无可显示内容</div>';

  // 渲染完成后立即应用当前过滤状态
  applyDebugFilter();
}

function summarizeFrames(frames) {
  if (!frames.length) return '';
  const types = frames.map(f => {
    const t = f.type;
    if (t === 'yc') return `遥测×${(f.data||[]).length}`;
    if (t === 'yx' || t === 'soe') return `遥信×${(f.data||[]).length}`;
    if (t === 'control') return `遥控×${(f.data||[]).length}`;
    if (t === 'fault') return '故障事件';
    if (t === 'energy') return `电能×${(f.data||[]).length}`;
    if (t === 'total_call') return '总召';
    if (t === 'clock') return '对时';
    if (t === 'link_frame') return '链路帧';
    if (t === 'heartbeat') return '心跳';
    if (t === 'init') return '初始化';
    if (t === 'error') return '⚠解析错误';
    return t;
  });
  return types.join(' · ');
}

function renderFrames(frames, proto) {
  if (!frames.length) return '<div class="empty-frame-hint">（无可解析帧）</div>';
  return frames.map((f, i) => renderFrame(f, i, proto)).join('');
}

function renderFrame(f, idx, proto) {
  const cardId = `fc_${idx}_${Math.random().toString(36).slice(2,6)}`;
  const pb = protoBadge(f.protocol || proto);
  const tag = typeTag(f.type);
  let body = '';

  if (f.type === 'error') {
    return `<div class="frame-error">⚠ ${esc(f.error)}</div>`;
  }

  if (f.type === 'yc') body = renderYC(f, proto);
  else if (f.type === 'yx' || f.type === 'soe') body = renderYX(f, proto);
  else if (f.type === 'control') body = renderCtrl(f, proto);
  else if (f.type === 'fault') body = renderFault(f, proto);
  else if (f.type === 'energy') body = renderEnergy(f, proto);
  else if (f.type === 'link_frame') body = renderLinkFrame(f);
  else if (f.type === 'param') body = renderParam(f, proto);
  else body = `<div class="frame-json">${highlightTime(esc(JSON.stringify(f, null, 2)))}</div>`;

  const countStr = f.data ? ` <small class="frame-count">(${f.data.length}条)</small>` : '';

  return `
  <div class="frame-card" id="${cardId}">
    <div class="frame-card-head" onclick="toggleBlock('${cardId}')">
      <span>${pb}${tag}${countStr}</span>
      <span class="hex-chevron">▾</span>
    </div>
    <div class="frame-card-body" style="max-height:2000px">
      <div class="frame-table-wrap">${body}</div>
    </div>
  </div>`;
}

function renderYC(f, proto) {
  const rows = (f.data||[]).map((item, i) => {
    const name = ptName('yc', item.addr, proto);
    return `<tr>
      <td>${i+1}</td>
      <td>${item.addr??''}</td>
      <td class="mono">${addrHex(item.addr, proto)}</td>
      <td class="col-name"><span class="${name?'pname':'pname-none'}">${esc(name)||'—'}</span></td>
      <td>${esc(String(item.value??''))}</td>
      <td>${esc(item.quality||item.qds||'')}</td>
      <td>${highlightTime(esc(item.time||item.timestamp||''))}</td>
    </tr>`;
  }).join('');
  return `<table><thead><tr>
    <th>#</th><th>地址(dec)</th><th>地址(hex)</th>
    <th class="col-name">点名</th>
    <th>值</th><th>品质</th><th>时标</th>
  </tr></thead><tbody>${rows}</tbody></table>`;
}

function renderYX(f, proto) {
  const rows = (f.data||[]).map((item, i) => {
    const addr = item.addrDec ?? item.addr;
    const name = ptName('yx', addr, proto);
    return `<tr>
      <td>${i+1}</td>
      <td>${addr??''}</td>
      <td class="mono">${addrHex(addr, proto)}</td>
      <td class="col-name"><span class="${name?'pname':'pname-none'}">${esc(name)||'—'}</span></td>
      <td>${esc(item.state??'')}</td>
      <td>${highlightTime(esc(item.time||item.timestamp||''))}</td>
    </tr>`;
  }).join('');
  return `<table><thead><tr>
    <th>#</th><th>地址(dec)</th><th>地址(hex)</th>
    <th class="col-name">点名</th>
    <th>状态</th><th>时标</th>
  </tr></thead><tbody>${rows}</tbody></table>`;
}

function renderFault(f, proto) {
  let html = '';
  if ((f.yx||[]).length) {
    html += '<div class="frame-block-header">📍 遥信</div>';
    const rows = f.yx.map((item,i) => {
      const name = ptName('yx', item.point, proto);
      return `<tr>
        <td>${i+1}</td>
        <td>${item.point??''}</td>
        <td class="mono">${addrHex(item.point, proto)}</td>
        <td class="col-name"><span class="${name?'pname':'pname-none'}">${esc(name)||'—'}</span></td>
        <td>${esc(item.state??'')}</td>
        <td>${highlightTime(esc(item.time||''))}</td>
      </tr>`;
    }).join('');
    html += `<table><thead><tr><th>#</th><th>地址(dec)</th><th>地址(hex)</th><th class="col-name">点名</th><th>状态</th><th>时标</th></tr></thead><tbody>${rows}</tbody></table>`;
  }
  if ((f.yc||[]).length) {
    html += '<div class="frame-block-header">📊 遥测</div>';
    const rows = f.yc.map((item,i) => {
      const name = ptName('yc', item.addr||item.point, proto);
      return `<tr>
        <td>${i+1}</td>
        <td>${item.addr??item.point??''}</td>
        <td class="mono">${addrHex(item.addr??item.point, proto)}</td>
        <td class="col-name"><span class="${name?'pname':'pname-none'}">${esc(name)||'—'}</span></td>
        <td>${esc(String(item.value??''))}</td>
        <td>${highlightTime(esc(item.time||item.timestamp||''))}</td>
      </tr>`;
    }).join('');
    html += `<table><thead><tr><th>#</th><th>地址(dec)</th><th>地址(hex)</th><th class="col-name">点名</th><th>值</th><th>时标</th></tr></thead><tbody>${rows}</tbody></table>`;
  }
  if (!html) html = `<div class="frame-json">${highlightTime(esc(JSON.stringify(f,null,2)))}</div>`;
  return html;
}

function renderCtrl(f, proto) {
  const rows = (f.data||[]).map((item,i) => {
    const addrDec = parseInt(String(item.addr||'').replace(/^0x/i,''),16);
    const name = ptName('yk', isNaN(addrDec)?item.addr:addrDec, proto);
    return `<tr>
      <td>${i+1}</td>
      <td class="mono">${esc(item.addr??'')}</td>
      <td class="col-name"><span class="${name?'pname':'pname-none'}">${esc(name)||'—'}</span></td>
      <td>${esc(item.state??'')}</td>
      <td>${esc(item.operation??'')}</td>
      <td>${esc(item.return??'')}</td>
    </tr>`;
  }).join('');
  return `<table><thead><tr>
    <th>#</th><th>地址</th>
    <th class="col-name">点名</th>
    <th>状态</th><th>操作</th><th>结果</th>
  </tr></thead><tbody>${rows}</tbody></table>`;
}

function renderEnergy(f, proto) {
  const rows = (f.data||[]).map((item,i) => {
    const name = ptName('en', item.addr, proto);
    return `<tr>
      <td>${i+1}</td>
      <td>${item.addr??''}</td>
      <td class="mono">${addrHex(item.addr,proto)}</td>
      <td class="col-name"><span class="${name?'pname':'pname-none'}">${esc(name)||'—'}</span></td>
      <td>${typeof item.value==='number'?item.value.toFixed(3):esc(String(item.value??''))}</td>
      <td>${highlightTime(esc(item.time||''))}</td>
    </tr>`;
  }).join('');
  return `<table><thead><tr>
    <th>#</th><th>地址(dec)</th><th>地址(hex)</th>
    <th class="col-name">点名</th>
    <th>值</th><th>时标</th>
  </tr></thead><tbody>${rows}</tbody></table>`;
}

function renderParam(f, proto) {
  const rows = (f.data||[]).map((item,i) => {
    const addrNum = parseInt(String(item.addr||'').replace(/^0x/i,''),16);
    const name = ptName('para', isNaN(addrNum)?item.addr:addrNum, proto);
    return `<tr>
      <td>${i+1}</td>
      <td class="mono">${esc(item.addr??'')}</td>
      <td class="col-name"><span class="${name?'pname':'pname-none'}">${esc(name)||'—'}</span></td>
      <td>${esc(item.operation??'')}</td>
      <td>${esc(String(item.value??''))}</td>
    </tr>`;
  }).join('');
  return `<table><thead><tr>
    <th>#</th><th>地址</th>
    <th class="col-name">点名</th>
    <th>操作</th><th>值</th>
  </tr></thead><tbody>${rows}</tbody></table>`;
}

function renderLinkFrame(f) {
  const ht = s => highlightTime(esc(s));
  return `<div class="link-frame">
    链路地址: ${ht(String(f.linkAddr??'—'))}
    帧类型: ${ht(f.frameType||'—')}
    方向: ${ht(f.ctrl?.direction||'—')}
    功能码: ${ht(String(f.ctrl?.fc??'—'))} ${ht(f.ctrl?.fcName||'')}
    校验: ${f.csValid?'✓':'✗'}
  </div>`;
}

function toggleBlock(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.toggle('collapsed');
}

function clearAll() {
  logText = ''; logFileName = ''; parseResult = null;
  document.getElementById('logInput').value = '';
  document.getElementById('logFileInput').value = '';
  document.getElementById('dropZone').classList.remove('has-file');
  document.getElementById('dropIcon').textContent = '📄';
  document.getElementById('dropLabel').textContent = '点击选择 log 文件，或拖拽到此处';
  document.getElementById('dropName').textContent = '';
  checkParseEnable();
  document.getElementById('downloadBtn').disabled = true;
  document.getElementById('statsBar').className = 'stats-bar';
  document.getElementById('output').innerHTML = '<div class="empty-hint">上传 log 文件后点击「解析 Log」按钮开始</div>';
  document.getElementById('parseStatus').textContent = '';
  document.getElementById('errorBox').style.display = 'none';
}

function setDefaultTableBasedOnProtocol(parseResult) {
  if (!PT.ok || !PT.tableNames.length) return;
  const protocols = {};
  parseResult.lines.forEach(line => {
    if (line.type === 'hex' && line.protocol) protocols[line.protocol] = (protocols[line.protocol] || 0) + 1;
  });
  let mainProto = null, maxCount = 0;
  for (const [proto, count] of Object.entries(protocols)) {
    if (count > maxCount) { maxCount = count; mainProto = proto; }
  }
  if (!mainProto) return;
  const sel = document.getElementById('tableSelect');
  if (!sel) return;

  // 已经有手动选了表则不改
  if (sel.value) return;

  let defaultTable = '';

  if (mainProto === '101') {
    // 101 下默认全点表，除非用户已主动开 101 转发选项后手动选表
    if (PT.follow101Transfer && PT.curTable) {
      defaultTable = PT.curTable;
    } else {
      defaultTable = '';
    }
  } else if (mainProto === '104') {
    defaultTable = PT.tableNames.includes('入网检') ? '入网检' : (PT.tableNames[0] || '');
  }

  if (defaultTable !== sel.value) {
    sel.value = defaultTable;
    rebuildPointMaps(defaultTable ? defaultTable : null);
    if (parseResult) renderResult(parseResult);
  }
}

function downloadLog() {
  if (!parseResult) return;
  const lines = parseResult.lines || [];
  const parts = [];

  lines.forEach(line => {
    if (line.type === 'empty') { parts.push(''); return; }
    if (line.type === 'debug') { parts.push(line.raw); return; }
    if (line.type !== 'hex') { parts.push(line.raw); return; }

    parts.push(line.raw);
    const proto = line.protocol || '104';
    parts.push(`  {${proto}}`);

    (line.frames||[]).forEach(f => {
      if (f.type === 'error') { parts.push(`  [*错误*] ${f.error}`); return; }
      if (f.type === 'link_frame') { parts.push(`  [*链路帧*] 地址:${f.linkAddr} ${f.ctrl?.fcName||''}`); return; }

      const typeLabel = {
        yc:'*遥测*',yx:'*遥信*',soe:'*SOE遥信*',control:'*遥控*',
        param:'*定值*',energy:'*电能量*',fault:'*故障事件*',
        clock:'*对时*',total_call:'*总召*',heartbeat:'*心跳*',
        init:'*初始化*'
      }[f.type] || `*${f.type}*`;

      parts.push(`  [${typeLabel}]`);

      if (f.type === 'yc') {
        parts.push(`  #\t协议\t地址(dec)\t地址(hex)\t点名\t值\t时标`);
        (f.data||[]).forEach((item,i) => {
          const name = ptName('yc', item.addr, line.protocol || proto) || '—';
          parts.push(`  ${i+1}\t${proto}\t${item.addr??''}\t${addrHex(item.addr,proto)}\t${name}\t${item.value??''}\t${item.time||''}`);
        });
      } else if (f.type === 'yx' || f.type === 'soe') {
        parts.push(`  #\t协议\t地址(dec)\t地址(hex)\t点名\t状态\t触发时间`);
        (f.data||[]).forEach((item,i) => {
          const addr = item.addrDec ?? item.addr;
          const name = ptName('yx', addr, line.protocol || proto) || '—';
          parts.push(`  ${i+1}\t${proto}\t${addr??''}\t${addrHex(addr,proto)}\t${name}\t${item.state??''}\t${item.time||item.timestamp||''}`);
        });
      } else if (f.type === 'control') {
        parts.push(`  #\t协议\t地址\t点名\t状态\t操作\t结果`);
        (f.data||[]).forEach((item,i) => {
          const addrDec = parseInt(String(item.addr||'').replace(/^0x/i,''),16);
          const name = ptName('yk', isNaN(addrDec)?item.addr:addrDec, line.protocol || proto) || '—';
          parts.push(`  ${i+1}\t${proto}\t${item.addr??''}\t${name}\t${item.state??''}\t${item.operation??''}\t${item.return??''}`);
        });
      } else if (f.type === 'fault') {
        (f.yx||[]).forEach((item,i) => {
          if (i===0) parts.push(`  #\t协议\t地址(dec)\t点名\t状态\t时标  [遥信]`);
          const name = ptName('yx', item.point, line.protocol || proto) || '—';
          parts.push(`  ${i+1}\t${proto}\t${item.point??''}\t${name}\t${item.state??''}\t${item.time||''}`);
        });
        (f.yc||[]).forEach((item,i) => {
          if (i===0) parts.push(`  #\t协议\t地址(dec)\t点名\t值\t时标  [遥测]`);
          const name = ptName('yc', item.addr||item.point, line.protocol || proto) || '—';
          parts.push(`  ${i+1}\t${proto}\t${item.addr??item.point??''}\t${name}\t${item.value??''}\t${item.time||''}`);
        });
      } else if (f.type === 'energy') {
        parts.push(`  #\t协议\t地址(dec)\t地址(hex)\t点名\t值\t时标`);
        (f.data||[]).forEach((item,i) => {
          const name = ptName('en', item.addr, line.protocol || proto) || '—';
          const val = typeof item.value==='number' ? item.value.toFixed(3) : (item.value??'');
          parts.push(`  ${i+1}\t${proto}\t${item.addr??''}\t${addrHex(item.addr,proto)}\t${name}\t${val}\t${item.time||''}`);
        });
      } else {
        parts.push(`  ${JSON.stringify(f)}`);
      }
    });
    parts.push('');
  });

  const blob = new Blob([parts.join('\n')], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (logFileName.replace(/\.[^.]+$/, '') || 'parsed') + '_parsed.log';
  a.click();
  URL.revokeObjectURL(url);
}

// ── 主题切换 ──
function initializeTheme() {
    const html = document.documentElement;
    const savedTheme = localStorage.getItem('theme');
    let theme = savedTheme;
    if (!theme) {
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        theme = prefersDark ? 'dark' : 'light';
    }
    applyTheme(theme);
    setupThemeToggle();
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
        if (!localStorage.getItem('theme')) applyTheme(e.matches ? 'dark' : 'light');
    });
}

function applyTheme(theme) {
    const html = document.documentElement;
    if (theme === 'dark') { html.classList.add('dark-theme'); html.classList.remove('light-theme'); }
    else { html.classList.add('light-theme'); html.classList.remove('dark-theme'); }
}

function toggleTheme() {
    const html = document.documentElement;
    const isDark = html.classList.contains('dark-theme');
    const newTheme = isDark ? 'light' : 'dark';
    localStorage.setItem('theme', newTheme);
    applyTheme(newTheme);
    updateThemeButton();
}

function setupThemeToggle() {
    const btn = document.getElementById('themeToggle');
    if (btn) { btn.onclick = (e) => { e.preventDefault(); toggleTheme(); }; updateThemeButton(); }
}

function updateThemeButton() {
    const btn = document.getElementById('themeToggle');
    if (!btn) return;
    const isDark = document.documentElement.classList.contains('dark-theme');
    btn.innerHTML = isDark ? '☀️ 亮色' : '🌙 暗色';
}

function initializeWindowControls() {
    const minBtn = document.getElementById('min-btn');
    const maxBtn = document.getElementById('max-btn');
    const closeBtn = document.getElementById('close-btn');

    if (!window.windowControls) return;
    document.documentElement.classList.add('electron');

    minBtn?.addEventListener('click', () => window.windowControls.minimize());
    closeBtn?.addEventListener('click', () => window.windowControls.close());

    const updateMaxButton = (isMaximized) => {
        if (maxBtn) maxBtn.textContent = isMaximized ? '❐' : '▢';
    };

    maxBtn?.addEventListener('click', async () => {
        window.windowControls.maximize();
        const maximized = await window.windowControls.isMaximized();
        updateMaxButton(maximized);
    });

    window.windowControls.onMaximize(() => updateMaxButton(true));
    window.windowControls.onUnmaximize(() => updateMaxButton(false));

    window.windowControls.isMaximized().then(updateMaxButton);
}

document.addEventListener('DOMContentLoaded', () => {
    initializeTheme();
    setupThemeToggle();
    initializeWindowControls();
});
if (document.readyState !== 'loading') {
    initializeTheme();
    setupThemeToggle();
    initializeWindowControls();
}
