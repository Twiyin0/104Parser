<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log文件解析器 · IEC 104/101</title>
<style>
:root{--bg-primary:#f1f5f9;--bg-secondary:#ffffff;--bg-tertiary:#f8fafc;--text-primary:#0f172a;--text-secondary:#475569;--text-tertiary:#64748b;--border-color:#cbd5e1;--border-light:#e2e8f0;--hover-bg:#f1f5f9;--input-bg:#f8fafc;--accent-primary:#2563eb;--accent-secondary:#7c3aed;--success-bg:#f0fdf4;--warn-bg:#fffbeb;--danger-bg:#fef2f2;--panel-bg:#f8fafc} @media (prefers-color-scheme:dark){:root{--bg-primary:#0f172a;--bg-secondary:#1e293b;--bg-tertiary:#334155;--text-primary:#f1f5f9;--text-secondary:#cbd5e1;--text-tertiary:#94a3b8;--border-color:#475569;--border-light:#334155;--hover-bg:#334155;--input-bg:#1e293b;--accent-primary:#60a5fa;--accent-secondary:#c084fc;--success-bg:#0f766e;--warn-bg:#92400e;--danger-bg:#881337;--panel-bg:#1e293b}}html.dark-theme{--bg-primary:#0f172a;--bg-secondary:#1e293b;--bg-tertiary:#334155;--text-primary:#f1f5f9;--text-secondary:#cbd5e1;--text-tertiary:#94a3b8;--border-color:#475569;--border-light:#334155;--hover-bg:#334155;--input-bg:#1e293b;--accent-primary:#60a5fa;--accent-secondary:#c084fc;--success-bg:#0f766e;--warn-bg:#92400e;--danger-bg:#881337;--panel-bg:#1e293b}html.light-theme{--bg-primary:#f1f5f9;--bg-secondary:#ffffff;--bg-tertiary:#f8fafc;--text-primary:#0f172a;--text-secondary:#475569;--text-tertiary:#64748b;--border-color:#cbd5e1;--border-light:#e2e8f0;--hover-bg:#f1f5f9;--input-bg:#f8fafc;--accent-primary:#2563eb;--accent-secondary:#7c3aed;--success-bg:#f0fdf4;--warn-bg:#fffbeb;--danger-bg:#fef2f2;--panel-bg:#f8fafc}
*{box-sizing:border-box}
body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:var(--bg-primary);margin:0;padding:20px;min-height:100vh;color:var(--text-primary);transition:background-color .3s,color .3s}
.container{max-width:1700px;margin:0 auto;background:var(--bg-secondary);border-radius:20px;box-shadow:0 20px 40px -8px rgba(0,0,0,.12);padding:28px;transition:background-color .3s}

/* header */
h1{font-size:1.8rem;font-weight:700;margin:0 0 6px;color:var(--text-primary);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
h1 .badge{background:#2563eb;color:white;font-size:.75rem;padding:3px 12px;border-radius:30px;font-weight:400}
h1 .badge-101{background:#0891b2}
h1 .badge-log{background:#7c3aed}
.theme-toggle{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border-radius:30px;border:1.5px solid var(--border-color);background:var(--input-bg);color:var(--text-primary);cursor:pointer;font-size:.9rem;transition:background .15s;margin-left:auto}
.theme-toggle:hover{background:var(--hover-bg)}
.nav-link{font-size:.85rem;color:#2563eb;text-decoration:none;padding:5px 14px;border:1.5px solid #bfdbfe;border-radius:20px;transition:background .15s;margin-left:8px}
.nav-link:hover{background:#eff6ff}
.sub{color:var(--text-secondary);margin-bottom:12px;border-left:4px solid var(--accent-secondary);padding:6px 12px;background:var(--panel-bg);border-radius:0 8px 8px 0;font-size:.9rem;line-height:1.6}

/* DB bar */
.db-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px;padding:8px 12px;border:1.5px dashed var(--border-color);border-radius:12px;background:var(--input-bg);transition:border-color .2s,background .2s}
.db-bar.ok{border-style:solid;border-color:#4ade80;background:var(--success-bg)}
.db-bar.err{border-color:#f87171;background:var(--danger-bg)}
.db-label{font-size:.85rem;color:var(--text-tertiary);white-space:nowrap;display:flex;align-items:center;gap:6px}
.db-pill{font-size:.78rem;font-weight:600;padding:2px 10px;border-radius:20px;white-space:nowrap}
.db-pill.ok{background:#dcfce7;color:#16a34a}
.db-pill.none{background:var(--input-bg);color:var(--text-tertiary)}
.db-pill.err{background:#fee2e2;color:#dc2626}
.db-pill.loading{background:#fef3c7;color:#d97706}
.db-file-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:30px;font-size:.83rem;font-weight:500;cursor:pointer;border:1.5px solid var(--border-color);background:var(--bg-secondary);color:var(--text-secondary);transition:background .15s}
.db-file-btn:hover{background:var(--hover-bg)}
.db-detail{font-size:.75rem;color:var(--text-tertiary);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.db-clear{display:none;align-items:center;gap:4px;padding:4px 11px;border-radius:30px;font-size:.78rem;cursor:pointer;border:1.5px solid #fca5a5;background:#fff5f5;color:#ef4444}
.db-bar.ok .db-clear{display:inline-flex}
.db-bar.ok .db-file-btn{display:none}
.table-sel-wrap{display:none;align-items:center;gap:6px;border-left:1.5px solid #bbf7d0;padding-left:10px}
.db-bar.ok .table-sel-wrap{display:flex}

#tableSelect{padding:4px 10px;border-radius:8px;font-size:.82rem;border:1.5px solid #86efac;background:white;color:#14532d;cursor:pointer;outline:none}

/* controls */

#logInput{width:100%;flex:1;min-height:300px;padding:8px;border:1px solid var(--border-color);border-radius:6px;font-family:monospace;font-size:.8rem;resize:vertical;background:var(--input-bg);color:var(--text-primary);outline:none;transition:border .2s}

.radio-group{display:flex;flex-direction:column;gap:4px}
.radio-group label{display:flex;align-items:center;gap:6px;font-size:.85rem;color:var(--text-secondary);cursor:pointer}
.radio-group input{cursor:pointer;accent-color:#2563eb}

.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 20px;border-radius:40px;font-size:.95rem;font-weight:500;cursor:pointer;border:1.5px solid transparent;transition:background .15s,transform .1s}

.stats-bar.visible{display:flex}

.stat-pill.yc{background:#fce7f3;color:#9d174d}

.stat-pill.ctrl{background:#fef3c7;color:#92400e}
.stat-pill.fault{background:#fee2e2;color:#991b1b}
.stat-pill.energy{background:#ede9fe;color:#4c1d95}
.stat-pill.lines{background:#e0f2fe;color:#0369a1}

.stat-pill.proto101{background:#cffafe;color:#0e7490}

/* output */
.output{margin-top:4px}
.line-block{margin-bottom:2px}
.debug-line{font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--text-tertiary);padding:3px 10px;background:var(--input-bg);border-left:3px solid var(--border-color);white-space:pre-wrap;word-break:break-all}
.hex-block{border:1.5px solid var(--border-light);border-radius:10px;overflow:hidden;margin-bottom:6px}
.hex-header{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--input-bg);border-bottom:1px solid var(--border-light);cursor:pointer;user-select:none;transition:background .15s}
.hex-header:hover{background:var(--hover-bg)}
.hex-raw{font-family:'JetBrains Mono',monospace;font-size:.74rem;color:var(--text-secondary);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hex-chevron{font-size:.8rem;color:var(--text-tertiary);transition:transform .2s;flex-shrink:0}
.hex-block.collapsed .hex-chevron{transform:rotate(-90deg)}
.hex-body{overflow:hidden;transition:max-height .25s ease}
.hex-block.collapsed .hex-body{max-height:0!important}
.frames-wrap{padding:8px 12px;background:var(--bg-secondary)}

/* proto badges */
.proto-104{display:inline-block;font-size:.68rem;font-weight:700;background:#dbeafe;color:#1d4ed8;padding:1px 7px;border-radius:4px;margin-right:4px;vertical-align:middle;white-space:nowrap}
.proto-101{display:inline-block;font-size:.68rem;font-weight:700;background:#cffafe;color:#0e7490;padding:1px 7px;border-radius:4px;margin-right:4px;vertical-align:middle;white-space:nowrap}

/* frame cards */
.frame-card{border-radius:8px;overflow:hidden;margin-bottom:6px;border:1px solid var(--border-light)}
.frame-card-head{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;background:var(--panel-bg);cursor:pointer;user-select:none;font-size:.82rem;font-weight:600;color:var(--text-primary);border-bottom:1px solid var(--border-light)}

.frame-card.collapsed .frame-card-body{max-height:0!important}
.frame-table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.83rem}

tr:last-child td{border-bottom:none}
tr:hover td{background:#fafbff}

/* type colors */
.tag-yc{background:#fce7f3;color:#9d174d;font-size:.68rem;font-weight:700;padding:1px 6px;border-radius:4px;display:inline-block}
.tag-yx{background:#d1fae5;color:#065f46;font-size:.68rem;font-weight:700;padding:1px 6px;border-radius:4px;display:inline-block}
.tag-ctrl{background:#fef3c7;color:#92400e;font-size:.68rem;font-weight:700;padding:1px 6px;border-radius:4px;display:inline-block}
.tag-fault{background:#fee2e2;color:#991b1b;font-size:.68rem;font-weight:700;padding:1px 6px;border-radius:4px;display:inline-block}
.tag-energy{background:#ede9fe;color:#4c1d95;font-size:.68rem;font-weight:700;padding:1px 6px;border-radius:4px;display:inline-block}
.tag-clock{background:#fef3c7;color:#92400e;font-size:.68rem;font-weight:700;padding:1px 6px;border-radius:4px;display:inline-block}
.tag-total{background:#e0f2fe;color:#0369a1;font-size:.68rem;font-weight:700;padding:1px 6px;border-radius:4px;display:inline-block}
.tag-link{background:#f3f4f6;color:#374151;font-size:.68rem;font-weight:700;padding:1px 6px;border-radius:4px;display:inline-block}
.tag-test{background:#ecfdf5;color:#065f46;font-size:.68rem;font-weight:700;padding:1px 6px;border-radius:4px;display:inline-block}
.tag-other{background:#f3f4f6;color:#4b5563;font-size:.68rem;font-weight:700;padding:1px 6px;border-radius:4px;display:inline-block}

/* dir badge */
.dir-tx{background:#bfdbfe;color:#1e40af;font-size:.68rem;font-weight:700;padding:1px 6px;border-radius:4px;display:inline-block}
.dir-rx{background:#bbf7d0;color:#14532d;font-size:.68rem;font-weight:700;padding:1px 6px;border-radius:4px;display:inline-block}

</style>

<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
<div class="container">
  <h1>📄 Log 文件解析器 <span class="badge">104</span><span class="badge badge-101">101</span><span class="badge badge-log">LOG</span>
    <button id="themeToggle" class="theme-toggle" style="margin-left:auto">🌙 暗色</button>
    <a href="/" class="nav-link">← 返回实时解析</a>
  </h1>
  <div class="sub">
    上传 log 文件后自动逐行解析，保留原始调试信息，识别 <code>Tx/Rx</code> 帧并解析 101/104 协议内容。
    可加载点表 db 文件查看点名。支持网页展示或下载解析后的 log 文件。
  </div>

  <!-- DB Bar -->
  <div class="db-bar" id="dbBar">
    <span class="db-label">🗃️ 点表 DB</span>
    <span class="db-pill none" id="dbPill">未加载</span>
    <label class="db-file-btn" for="dbFileInput">📂 选择点表文件</label>
    <input type="file" id="dbFileInput" accept=".db,.json,.sqlite,.sqlite3" style="display:none">
    <span class="db-detail" id="dbDetail"></span>
    <div class="table-sel-wrap" id="tableSelWrap">
      <span class="table-sel-label">转发表：</span>
      <select id="tableSelect"><option value="">全点表（101默认）</option></select>
    </div>
    <button class="db-clear" id="dbClear" onclick="clearDB()">✕ 清除</button>
  </div>

  <!-- Log File -->
  <div class="ctrl-row">
    <div class="log-drop-zone" id="dropZone" onclick="document.getElementById('logFileInput').click()">
      <div class="log-drop-icon" id="dropIcon">📄</div>
      <div class="log-drop-label" id="dropLabel">点击选择 log 文件，或拖拽到此处</div>
      <div class="log-drop-name" id="dropName"></div>
      <input type="file" id="logFileInput" accept=".log,.txt">
    </div>

    <div class="proto-sel-box">
      <div class="proto-sel-title">协议强制模式</div>
      <div class="radio-group">
        <label><input type="radio" name="proto" value="auto" checked> 🔍 自动识别（推荐）</label>
        <label><input type="radio" name="proto" value="104"> <span class="proto-104">104</span> 强制 IEC 104</label>
        <label><input type="radio" name="proto" value="101"> <span class="proto-101">101</span> 强制 IEC 101</label>
      </div>
    </div>
  </div>

  <!-- Log Text Input -->
  <div class="ctrl-row" style="min-height:40vh;flex:1;margin-bottom:6px;">
    <div class="log-input-box">
      <div class="log-input-title">输入 log 文本解析</div>
      <textarea id="logInput" placeholder="粘贴一小段 log 文本进行解析（可选，优先于文件）" oninput="checkParseEnable()"></textarea>
    </div>
  </div>

  <!-- Buttons -->
  <div class="btn-group">
    <button class="btn btn-primary" id="parseBtn" onclick="parseLog()" disabled>▶ 解析 Log</button>
    <button class="btn btn-green" id="downloadBtn" onclick="downloadLog()" disabled>⬇ 下载解析结果</button>
    <button class="btn btn-ghost" onclick="clearAll()">🗑 清空</button>
    <span id="parseStatus" style="font-size:.82rem;color:#64748b"></span>
  </div>

  <!-- Stats -->
  <div class="stats-bar" id="statsBar"></div>

  <!-- Error -->
  <div class="error-msg" id="errorBox" style="display:none"></div>

  <!-- Output -->
  <div class="output" id="output">
    <div class="empty-hint">上传 log 文件后点击「解析 Log」按钮开始</div>
  </div>
</div>

<script>
// ─── SQL.js 初始化 ─────────────────────────────────────────
let SQL = null;
let sqlReady = false;
let sqlLoadPromise = null;
let sqlRetries = 0;
const MAX_RETRIES = 3;

// 初始化 sql.js
function initSQL() {
  if (sqlReady && SQL) {
    return Promise.resolve(SQL);
  }
  
  if (sqlLoadPromise) {
    return sqlLoadPromise; // 返回已存在的承诺，避免重复加载
  }
  
  sqlLoadPromise = new Promise((resolve, reject) => {
    if (typeof initSqlJs === 'undefined') {
      // sql.js 脚本可能还没加载，等待一下再试
      console.log('⏳ 等待 initSqlJs 全局变量可用...');
      setTimeout(() => {
        if (typeof initSqlJs === 'undefined') {
          reject(new Error('initSqlJs 未定义 - sql.js 库加载失败'));
        } else {
          // 重新开始
          sqlLoadPromise = null;
          initSQL().then(resolve).catch(reject);
        }
      }, 500);
      return;
    }
    
    console.log(`⏳ sql.js 库加载中... (${sqlRetries + 1}/${MAX_RETRIES})`);
    
    initSqlJs({
      locateFile: (file) => {
        const url = `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/${file}`;
        console.log(`📦 加载资源: ${file}`);
        return url;
      }
    })
    .then(sql => {
      SQL = sql;
      sqlReady = true;
      sqlRetries = 0;
      console.log('✅ sql.js 库加载成功');
      resolve(sql);
    })
    .catch(err => {
      sqlLoadPromise = null; // 重置，以便重试
      console.warn(`❌ sql.js 加载失败 (第 ${sqlRetries + 1} 次): ${err.message}`);
      
      if (sqlRetries < MAX_RETRIES) {
        sqlRetries++;
        console.log(`⏳ 3秒后重试... (${sqlRetries}/${MAX_RETRIES})`);
        setTimeout(() => {
          initSQL().then(resolve).catch(reject);
        }, 3000);
      } else {
        reject(new Error(`sql.js 加载失败，已重试 ${MAX_RETRIES} 次：${err.message}`));
      }
    });
  });
  
  return sqlLoadPromise;
}

// 启动初始化（页面加载时）
console.log('🚀 页面加载完毕，启动 sql.js 初始化...');
initSQL().catch(e => {
  console.warn('⚠️ 后台加载失败: ' + e.message + ' - 将在首次使用数据库时重试');
});

// ─── State ─────────────────────────────────────────────────
let logText = '';
let logFileName = '';
let dbData = null;       // {yc:{addr:name}, yx:{}, yk:{}, en:{}, para:{}}
let parseResult = null;  // server response

const PT = {
  switchYXPoint : new Map(),
  switchYCPoint : new Map(),
  switchYKPoint : new Map(),
  switchENPoint : new Map(),
  maps : { para: new Map() },
  raw : { yc:[], yx:[], yk:[], en:[], para:[] },
  rawByTable: {},
  dbTables: [],
  tableNames : [],
  curTable : null,
  ok : false
};

function rebuildPointMaps(tableName) {
  PT.curTable = tableName;
  const isTransfer = (tableName && tableName !== '全点表');

  const normalizeName = name => name == null ? '' : String(name).trim();

  const buildMap = (rows, byTransfer = false) => {
    const m = new Map();
    for (const r of rows) {
      if (!r) continue;
      const rowTable = normalizeName(r.TableName);
      if (tableName && tableName !== '' && tableName !== '全点表' && tableName !== rowTable) {
        if (!PT.dbTables.includes(tableName)) continue;
      }

      let key, name;
      if (byTransfer || (isTransfer && rowTable)) {
        key = r.SwitchPoint != null ? Number(r.SwitchPoint) : null;
        name = normalizeName(r.SwitchName || r.SwitchName || r.name || r.Name);
      } else {
        key = r.Addr != null ? Number(r.Addr) : (r.addr != null ? Number(r.addr) : null);
        name = normalizeName(r.Name || r.name || r.SwitchName);
      }

      if (key != null && !Number.isNaN(key) && name) {
        m.set(String(key), name);
      }
    }
    return m;
  };

  // 对于 db 表名作为选择项（如 yc/yx/入网检），优先按原表数据生成映射。
  if (tableName && PT.dbTables.includes(tableName) && PT.rawByTable[tableName]) {
    const rows = PT.rawByTable[tableName];

    const lowerName = String(tableName).toLowerCase();
    let useType = null;
    if (['yc','yx','yk','en','para'].includes(lowerName)) useType = lowerName;
    // support Chinese label as yx类型转发表
    if (!useType && /入网检|遥信|遥测|遥控|电能|定值/.test(tableName)) {
      useType = tableName === '遥测' ? 'yc' : tableName === '遥控' ? 'yk' : tableName === '电能' ? 'en' : tableName === '定值' ? 'para' : 'yx';
    }

    PT.switchYXPoint = new Map();
    PT.switchYCPoint = new Map();
    PT.switchYKPoint = new Map();
    PT.switchENPoint = new Map();

    if (useType) {
      const m = buildMap(rows, useType === 'yx');
      if (useType === 'yx') PT.switchYXPoint = m;
      if (useType === 'yc') PT.switchYCPoint = m;
      if (useType === 'yk') PT.switchYKPoint = m;
      if (useType === 'en') PT.switchENPoint = m;
    } else {
      // 默认当作转发表（yx）
      PT.switchYXPoint = buildMap(rows, true);
    }

    PT.maps.para = new Map();
    for (const r of PT.raw.para) {
      if (!r || r.UpAddr == null) continue;
      PT.maps.para.set(String(Number(r.UpAddr)), normalizeName(r.Name));
    }

    PT.ok = true;
    return;
  }

  PT.switchYXPoint = buildMap(PT.raw.yx, isTransfer);
  PT.switchYCPoint = buildMap(PT.raw.yc, isTransfer);
  PT.switchYKPoint = buildMap(PT.raw.yk, isTransfer);
  PT.switchENPoint = buildMap(PT.raw.en, isTransfer);

  PT.maps.para = new Map();
  for (const r of PT.raw.para) {
    if (!r || r.UpAddr == null) continue;
    PT.maps.para.set(String(Number(r.UpAddr)), normalizeName(r.Name));
  }

  PT.ok = true;
}

function getTableNamesFromPT() {
  const names = new Set();
  for (const type of ['yc', 'yx', 'yk', 'en', 'para']) {
    for (const r of PT.raw[type]) {
      const tn = r.TableName ? String(r.TableName).trim() : '';
      if (tn) names.add(tn);
    }
  }

  // 兼容无 TableName，直接用 DB 表名（如 sample.db 的 yc/yx/yk）
  if (names.size === 0 && PT.dbTables.length > 0) {
    PT.dbTables.forEach(t => {
      if (t && !t.startsWith('sqlite_')) names.add(t);
    });
  }

  return Array.from(names).sort((a,b) => String(a).localeCompare(b, 'zh'));
}

document.getElementById('dbFileInput').addEventListener('change', e => {

function loadDB(file) {
  const bar = document.getElementById('dbBar');
  const pill = document.getElementById('dbPill');
  const detail = document.getElementById('dbDetail');
  
  const ext = file.name.toLowerCase().split('.').pop();
  console.log('🔄 开始加载文件:', file.name, '大小:', file.size, 'bytes');
  
  // 对于 SQLite 文件，先显示加载提示
  if (ext === 'db' || ext === 'sqlite' || ext === 'sqlite3') {
    pill.className = 'db-pill loading'; 
    pill.textContent = '初始化...';
    detail.textContent = '正在加载 sql.js 库...';
    bar.className = 'db-bar loading';
  } else {
    pill.className = 'db-pill loading'; 
    pill.textContent = '加载中...';
    bar.className = 'db-bar loading';
  }

  const reader = new FileReader();
  
  reader.onerror = (e) => {
    console.error('❌ 文件读取错误:', e);
    pill.className = 'db-pill err'; pill.textContent = '读取失败';
    bar.className = 'db-bar err';
    detail.textContent = '无法读取文件：' + (e?.message || e);
  };
  
  reader.onload = async (ev) => {
    try {
      // Handle SQLite binary file
      if (ext === 'db' || ext === 'sqlite' || ext === 'sqlite3') {
        console.log('📦 检测到 SQLite 文件');
        
        // 等待 sql.js 就绪
        pill.textContent = '正在加载 sql.js...';
        detail.textContent = '此过程需要几秒钟，请稍候...';
        
        let sql;
        try {
          sql = await initSQL();
          pill.textContent = '解析中...';
          detail.textContent = '正在解析数据库结构...';
        } catch (sqlErr) {
          throw new Error('sql.js 库加载失败：' + sqlErr.message + '\n\n如果问题持续，请检查网络连接或刷新页面。');
        }
        
        try {
          console.log('✓ sql.js 已就绪，开始解析数据库...');
          const data = new Uint8Array(ev.target.result);
          const db = new sql.Database(data);
          
          // 通用读表函数（参考 index.html）
          const readTable = (sql) => {
            try {
              const stmt = db.prepare(sql);
              const rows = [];
              while (stmt.step()) {
                rows.push(stmt.getAsObject());
              }
              stmt.free();
              return rows;
            } catch(e) {
              console.warn('执行 SQL 失败:', sql, e.message);
              return [];
            }
          };
          
          // 逐表读取数据（兼容 tableName 字段以及单独表名如 yc/yx/yk）
          console.log('📊 开始读取表数据...');
          let dbData = { yc:{}, yx:{}, yk:{}, en:{}, para:{} };
          PT.raw = { yc:[], yx:[], yk:[], en:[], para:[] };
          PT.rawByTable = {};

          // 获取所有表名
          const allTables = readTable("SELECT name FROM sqlite_master WHERE type='table' AND name NOT LIKE 'sqlite_%'");
          PT.dbTables = allTables.map(t => t.name);
          console.log('找到表:', PT.dbTables.join(', '));

          const tableTypeCandidates = {
            yc: ['yc', 'projectycpoint', 'jfxxx_yc', 'resource_yc', '遥测'],
            yx: ['yx', 'projectyxpoint', 'jfxxx_yx', 'resource_yx', '遥信', '入网检'],
            yk: ['yk', 'projectykpoint', 'jfxxx_yk', 'resource_yk', '遥控'],
            en: ['en', 'projectenergypoint', 'energy', '电能'],
            para: ['para', 'projectparatransferpoint', 'parameter', '定值']
          };

          const normalizeTableName = (name) => String(name || '').trim().toLowerCase();
          const guessType = (name, cols) => {
            const n = normalizeTableName(name);
            for (const [type, candidates] of Object.entries(tableTypeCandidates)) {
              if (candidates.includes(n)) return type;
            }
            // 根据字段猜测
            const lowerCols = cols.map(c=>c.name.toLowerCase());
            if (lowerCols.includes('switchpoint') && lowerCols.includes('switchname')) return 'yx';
            if (lowerCols.includes('addr') && lowerCols.includes('name')) {
              if (n === '入网检' || n.includes('检')) return 'yx';
              if (n === '遥测') return 'yc';
              if (n === '遥控') return 'yk';
              if (n === '电能') return 'en';
              return 'yx';
            }
            return null;
          };

          for (const tableName of PT.dbTables) {
            const cols = readTable(`PRAGMA table_info(\`${tableName}\`)`);
            const rows = readTable(`SELECT * FROM \`${tableName}\``);
            PT.rawByTable[tableName] = rows;

            const type = guessType(tableName, cols);
            if (type && Array.isArray(rows) && rows.length) {
              PT.raw[type] = rows;

              rows.forEach(row => {
                const addr = row.addr != null ? String(row.addr) : (row.Addr != null ? String(row.Addr) : '');
                const name = row.name || row.Name || row.SwitchName || row.name || '';
                if (addr) {
                  dbData[type][String(addr)] = String(name || addr);
                }
              });
            }
          }

          db.close();
          console.log('✅ 数据库读取完成');

          // 初始化点表原始行（用于转发表选择）
          // PT.raw 在上面已经填充；allRows已废弃
          PT.tableNames = getTableNamesFromPT();
          populateTableSelect(PT.tableNames);

          const defaultName = PT.tableNames.includes('入网检') ? '入网检' : (PT.tableNames[0] || '');
          if (defaultName) {
            const sel = document.getElementById('tableSelect');
            if (sel) sel.value = defaultName;
            rebuildPointMaps(defaultName);
          } else {
            rebuildPointMaps('全点表');
          }

          // 仍保留快速查找映射（兼容旧行为）
          dbData = normalizeDB(dbData);
          onDBLoaded(file.name, dbData);
          
        } catch (sqlErr) {
          throw new Error('数据库解析失败：' + (sqlErr?.message || sqlErr));
        }
        return;
      }
      
      // Handle JSON file
      console.log('📄 检测到 JSON 文件，大小:', ev.target.result.length);
      const json = JSON.parse(ev.target.result);
      console.log('✓ JSON 解析成功，格式检查...');
      
      if (json.tables || json.yc || json.yx) {
        dbData = normalizeDB(json);
        onDBLoaded(file.name, dbData);
      } else {
        throw new Error('未识别的格式，需要包含 yc、yx 或 tables 字段');
      }
    } catch(ex) {
      console.error('❌ 加载失败:', ex.message);
      pill.className = 'db-pill err'; pill.textContent = '格式错误';
      bar.className = 'db-bar err';
      detail.textContent = ex.message;
    }
  };
  
  // Read as appropriate format
  if (ext === 'db' || ext === 'sqlite' || ext === 'sqlite3') {
    reader.readAsArrayBuffer(file);
  } else {
    reader.readAsText(file, 'utf-8');
  }
}

function normalizeDB(raw) {
  // Support: {yc:{}, yx:{}, yk:{}, en:{}, para:{}} or {tables:{yc:[], ...}}
  const out = { yc:{}, yx:{}, yk:{}, en:{}, para:{}, tableNames:[] };
  if (raw.tables) {
    // table-based: raw.tables = { "转发表1": { yc:[{addr,name}], yx:[], ... }, ... }
    out.tableNames = Object.keys(raw.tables);
    // populate tableSelect
    populateTableSelect(out.tableNames);
    // Default: flatten all
    for (const tname of out.tableNames) {
      const t = raw.tables[tname];
      for (const type of ['yc','yx','yk','en','para']) {
        if (Array.isArray(t[type])) {
          t[type].forEach(({addr, name}) => { if (addr != null) out[type][addr] = name; });
        } else if (t[type] && typeof t[type] === 'object') {
          Object.assign(out[type], t[type]);
        }
      }
    }
    out._raw = raw;
  } else {
    // Flat: {yc:{addr:name}, ...} or {yc:[{addr,name}], ...}
    for (const type of ['yc','yx','yk','en','para']) {
      if (Array.isArray(raw[type])) {
        raw[type].forEach(({addr, name}) => { if (addr != null) out[type][addr] = name; });
      } else if (raw[type] && typeof raw[type] === 'object') {
        Object.assign(out[type], raw[type]);
      }
    }
  }
  return out;
}

async function parseLog() {
  const inputText = document.getElementById('logInput').value.trim();
  const useInput = inputText.length > 0;
  const textToParse = useInput ? inputText : logText;
  
  if (!textToParse) return;
  const btn = document.getElementById('parseBtn');
  const status = document.getElementById('parseStatus');
  btn.disabled = true; btn.textContent = '⏳ 解析中...';
  status.textContent = '';
  document.getElementById('errorBox').style.display = 'none';

  const proto = document.querySelector('input[name="proto"]:checked').value;
  try {
    const resp = await fetch('/parseLog', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ logText: textToParse, forceProtocol: proto === 'auto' ? undefined : proto })
    });
    if (!resp.ok) throw new Error(`Server error ${resp.status}`);
    parseResult = await resp.json();
    renderResult(parseResult);
    document.getElementById('downloadBtn').disabled = false;
    status.textContent = `✓ 解析完成 ${parseResult.lines.length} 行`;
    
    // 自适应设置默认表选择
    setDefaultTableBasedOnProtocol(parseResult);
  } catch(e) {
    document.getElementById('errorBox').textContent = '解析失败：' + e.message;
    document.getElementById('errorBox').style.display = 'block';
  } finally {
    btn.disabled = false; btn.textContent = '▶ 解析 Log';
  }
}

// ─── Render ─────────────────────────────────────────────────
function ptName(type, addr) {
  if (PT.ok) {
    const n = Number(addr);
    if (Number.isNaN(n)) return '';
    const isTransfer = (PT.curTable !== null && PT.curTable !== '全点表');
    switch (type) {
      case 'yx':   return PT.switchYXPoint.get(String(isTransfer ? n : n)) || '';
      case 'yc':   return PT.switchYCPoint.get(String(isTransfer ? n - 0x4000 : n)) || '';
      case 'yk':   return PT.switchYKPoint.get(String(isTransfer ? n - 0x6000 : n)) || '';
      case 'en':   return PT.switchENPoint.get(String(isTransfer ? n - 0x6400 : n)) || '';
      case 'para': return PT.maps.para.get(String(n)) || '';
      default: return '';
    }
  }

  if (!dbData || addr == null) return '';

  const map = dbData[type] || {};

  // 🔥 统一转成十进制 number
  let key = addr;

  if (typeof addr === 'string') {
    if (/^0x/i.test(addr)) {
      key = parseInt(addr, 16);
    } else {
      key = parseInt(addr, 10);
    }
  }

  // 再统一成字符串 key
  key = String(key);

  return map[key] || '';
}

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function addrHex(addr, proto) {
  if (addr == null) return '';
  const n = parseInt(addr, 10);
  if (isNaN(n)) return esc(String(addr));
  return proto === '101'
    ? '0x' + n.toString(16).padStart(4,'0').toUpperCase()
    : '0x' + n.toString(16).padStart(6,'0').toUpperCase();
}

function protoBadge(p) {
  return p === '101'
    ? '<span class="proto-101">101</span>'
    : '<span class="proto-104">104</span>';
}

function dirBadge(prefix) {
  if (!prefix) return '';
  if (/Tx/i.test(prefix)) return '<span class="dir-tx">Tx</span>';
  if (/Rx/i.test(prefix)) return '<span class="dir-rx">Rx</span>';
  return '';
}

function typeTag(type) {
  const map = {
    yc:'遥测',yx:'遥信',soe:'SOE',control:'遥控',param:'定值',
    energy:'电能',fault:'故障',clock:'对时',total_call:'总召',
    link_frame:'链路帧',heartbeat:'心跳',init:'初始化',
    file:'文件',reset:'复位',test:'测试'
  };
  const label = map[type] || type || '?';
  const cls = {
    yc:'yc',yx:'yx',soe:'yx',control:'ctrl',param:'ctrl',
    energy:'energy',fault:'fault',clock:'clock',total_call:'total',
    link_frame:'link',heartbeat:'test',init:'total',
    file:'other',reset:'other',test:'test'
  }[type] || 'other';
  return `<span class="tag-${cls}">${esc(label)}</span>`;
}

function renderResult(result) {
  const lines = result.lines || [];
  const out = document.getElementById('output');

  // stats
  let nHex=0,nDbg=0,n104=0,n101=0,nYC=0,nYX=0,nCtrl=0,nFault=0,nEnergy=0;
  lines.forEach(l => {
    if (l.type === 'hex') {
      nHex++;
      if (l.protocol === '104') n104++; else n101++;
      (l.frames||[]).forEach(f => {
        if (f.type === 'yc') nYC += (f.data||[]).length;
        if (f.type === 'yx' || f.type === 'soe') nYX += (f.data||[]).length;
        if (f.type === 'control') nCtrl += (f.data||[]).length;
        if (f.type === 'fault') nFault++;
        if (f.type === 'energy') nEnergy += (f.data||[]).length;
      });
    } else if (l.type !== 'empty') nDbg++;
  });

  const statsBar = document.getElementById('statsBar');
  statsBar.className = 'stats-bar visible';
  statsBar.innerHTML = `
    <span class="stat-pill lines">总行 ${lines.length}</span>
    <span class="stat-pill proto104">帧 ${nHex} 条</span>
    <span class="stat-pill proto104">104×${n104}</span>
    <span class="stat-pill proto101">101×${n101}</span>
    <span class="stat-pill yc">遥测 ${nYC}</span>
    <span class="stat-pill yx">遥信 ${nYX}</span>
    <span class="stat-pill ctrl">遥控 ${nCtrl}</span>
    <span class="stat-pill fault">故障 ${nFault}</span>
    <span class="stat-pill energy">电能 ${nEnergy}</span>
  `;

  const html = [];
  lines.forEach((line, idx) => {
    if (line.type === 'empty') return;
    if (line.type === 'debug') {
      html.push(`<div class="debug-line">${esc(line.raw)}</div>`);
      return;
    }
    if (line.type === 'hex') {
      const pb = protoBadge(line.protocol);
      const db = dirBadge(line.prefix);
      const framesSummary = summarizeFrames(line.frames||[]);
      const id = `hb${idx}`;
      html.push(`
      <div class="hex-block" id="${id}">
        <div class="hex-header" onclick="toggleBlock('${id}')">
          ${db}${pb}
          <span class="hex-raw">${esc(line.prefix||'')} <span style="color:#94a3b8">${esc(line.hexStr||'')}</span></span>
          <span style="font-size:.78rem;color:#64748b;margin-left:8px;flex-shrink:0">${framesSummary}</span>
          <span class="hex-chevron">▾</span>
        </div>
        <div class="hex-body" style="max-height:2000px">
          <div class="frames-wrap">${renderFrames(line.frames||[], line.protocol)}</div>
        </div>
      </div>`);
      return;
    }
  });

  out.innerHTML = html.join('') || '<div class="empty-hint">无可显示内容</div>';
}

function summarizeFrames(frames) {
  if (!frames.length) return '';
  const types = frames.map(f => {
    const t = f.type;
    if (t === 'yc') return `遥测×${(f.data||[]).length}`;
    if (t === 'yx' || t === 'soe') return `遥信×${(f.data||[]).length}`;
    if (t === 'control') return `遥控×${(f.data||[]).length}`;
    if (t === 'fault') return '故障事件';
    if (t === 'energy') return `电能×${(f.data||[]).length}`;
    if (t === 'total_call') return '总召';
    if (t === 'clock') return '对时';
    if (t === 'link_frame') return '链路帧';
    if (t === 'heartbeat') return '心跳';
    if (t === 'init') return '初始化';
    if (t === 'error') return '⚠解析错误';
    return t;
  });
  return types.join(' · ');
}

function renderFrames(frames, proto) {
  if (!frames.length) return '<div style="font-size:.78rem;color:#94a3b8;padding:8px">（无可解析帧）</div>';
  return frames.map((f, i) => renderFrame(f, i, proto)).join('');
}

function renderFrame(f, idx, proto) {
  const cardId = `fc_${idx}_${Math.random().toString(36).slice(2,6)}`;
  const pb = protoBadge(f.protocol || proto);
  const tag = typeTag(f.type);
  let body = '';

  if (f.type === 'error') {
    return `<div style="background:#fee2e2;color:#b91c1c;padding:6px 12px;border-radius:6px;font-size:.8rem;margin-bottom:4px">⚠ ${esc(f.error)}</div>`;
  }

  if (f.type === 'yc') {
    body = renderYC(f, proto);
  } else if (f.type === 'yx' || f.type === 'soe') {
    body = renderYX(f, proto);
  } else if (f.type === 'control') {
    body = renderCtrl(f, proto);
  } else if (f.type === 'fault') {
    body = renderFault(f, proto);
  } else if (f.type === 'energy') {
    body = renderEnergy(f, proto);
  } else if (f.type === 'link_frame') {
    body = renderLinkFrame(f);
  } else if (f.type === 'param') {
    body = renderParam(f, proto);
  } else {
    // Generic: show JSON
    body = `<div style="font-family:monospace;font-size:.75rem;color:#475569;padding:8px;background:#f8fafc;white-space:pre-wrap">${esc(JSON.stringify(f, null, 2))}</div>`;
  }

  const countStr = f.data ? ` <small style="color:#94a3b8;font-weight:400">(${f.data.length}条)</small>` : '';

  return `
  <div class="frame-card" id="${cardId}">
    <div class="frame-card-head" onclick="toggleBlock('${cardId}')">
      <span>${pb}${tag}${countStr}</span>
      <span class="hex-chevron">▾</span>
    </div>
    <div class="frame-card-body" style="max-height:2000px">
      <div class="frame-table-wrap">${body}</div>
    </div>
  </div>`;
}

// ── YC ──────────────────────────────────────────────────────
function renderYC(f, proto) {
  const rows = (f.data||[]).map((item, i) => {
    const name = ptName('yc', item.addr);
    return `<tr>
      <td>${i+1}</td>
      <td>${item.addr??''}</td>
      <td class="mono">${addrHex(item.addr, proto)}</td>
      <td class="col-name"><span class="${name?'pname':'pname-none'}">${esc(name)||'—'}</span></td>
      <td>${esc(String(item.value??''))}</td>
      <td>${esc(item.quality||item.qds||'')}</td>
      <td>${esc(item.time||item.timestamp||'')}</td>
    </tr>`;
  }).join('');
  return `<table><thead><tr>
    <th>#</th><th>地址(dec)</th><th>地址(hex)</th>
    <th class="col-name">点名</th>
    <th>值</th><th>品质</th><th>时标</th>
  </tr></thead><tbody>${rows}</tbody></table>`;
}

// ── YX / SOE ─────────────────────────────────────────────────
function renderYX(f, proto) {
  const rows = (f.data||[]).map((item, i) => {
    const addr = item.addrDec ?? item.addr;
    const name = ptName('yx', addr);
    return `<tr>
      <td>${i+1}</td>
      <td>${addr??''}</td>
      <td class="mono">${addrHex(addr, proto)}</td>
      <td class="col-name"><span class="${name?'pname':'pname-none'}">${esc(name)||'—'}</span></td>
      <td>${esc(item.state??'')}</td>
      <td>${esc(item.time||item.timestamp||'')}</td>
    </tr>`;
  }).join('');
  return `<table><thead><tr>
    <th>#</th><th>地址(dec)</th><th>地址(hex)</th>
    <th class="col-name">点名</th>
    <th>状态</th><th>时标</th>
  </tr></thead><tbody>${rows}</tbody></table>`;
}

// ── Fault ─────────────────────────────────────────────────────
function renderFault(f, proto) {
  let html = '';
  if ((f.yx||[]).length) {
    html += '<div style="font-weight:600;font-size:.8rem;color:#991b1b;padding:6px 10px;background:#fff1f1">📍 遥信</div>';
    const rows = f.yx.map((item,i) => {
      const name = ptName('yx', item.point);
      return `<tr>
        <td>${i+1}</td>
        <td>${item.point??''}</td>
        <td class="mono">${addrHex(item.point, proto)}</td>
        <td class="col-name"><span class="${name?'pname':'pname-none'}">${esc(name)||'—'}</span></td>
        <td>${esc(item.state??'')}</td>
        <td>${esc(item.time||'')}</td>
      </tr>`;
    }).join('');
    html += `<table><thead><tr><th>#</th><th>地址(dec)</th><th>地址(hex)</th><th class="col-name">点名</th><th>状态</th><th>时标</th></tr></thead><tbody>${rows}</tbody></table>`;
  }
  if ((f.yc||[]).length) {
    html += '<div style="font-weight:600;font-size:.8rem;color:#9d174d;padding:6px 10px;background:#fff1f5">📊 遥测</div>';
    const rows = f.yc.map((item,i) => {
      const name = ptName('yc', item.addr||item.point);
      return `<tr>
        <td>${i+1}</td>
        <td>${item.addr??item.point??''}</td>
        <td class="mono">${addrHex(item.addr??item.point, proto)}</td>
        <td class="col-name"><span class="${name?'pname':'pname-none'}">${esc(name)||'—'}</span></td>
        <td>${esc(String(item.value??''))}</td>
        <td>${esc(item.time||item.timestamp||'')}</td>
      </tr>`;
    }).join('');
    html += `<table><thead><tr><th>#</th><th>地址(dec)</th><th>地址(hex)</th><th class="col-name">点名</th><th>值</th><th>时标</th></tr></thead><tbody>${rows}</tbody></table>`;
  }
  if (!html) html = `<div style="font-family:monospace;font-size:.75rem;color:#475569;padding:8px;background:#f8fafc;white-space:pre-wrap">${esc(JSON.stringify(f,null,2))}</div>`;
  return html;
}

// ── Control ───────────────────────────────────────────────────
function renderCtrl(f, proto) {
  const rows = (f.data||[]).map((item,i) => {
    const addrDec = parseInt(String(item.addr||'').replace(/^0x/i,''),16);
    const name = ptName('yk', isNaN(addrDec)?item.addr:addrDec);
    return `<tr>
      <td>${i+1}</td>
      <td class="mono">${esc(item.addr??'')}</td>
      <td class="col-name"><span class="${name?'pname':'pname-none'}">${esc(name)||'—'}</span></td>
      <td>${esc(item.state??'')}</td>
      <td>${esc(item.operation??'')}</td>
      <td>${esc(item.return??'')}</td>
    </tr>`;
  }).join('');
  return `<table><thead><tr>
    <th>#</th><th>地址</th>
    <th class="col-name">点名</th>
    <th>状态</th><th>操作</th><th>结果</th>
  </tr></thead><tbody>${rows}</tbody></table>`;
}

// ── Energy ────────────────────────────────────────────────────
function renderEnergy(f, proto) {
  const rows = (f.data||[]).map((item,i) => {
    const name = ptName('en', item.addr);
    return `<tr>
      <td>${i+1}</td>
      <td>${item.addr??''}</td>
      <td class="mono">${addrHex(item.addr,proto)}</td>
      <td class="col-name"><span class="${name?'pname':'pname-none'}">${esc(name)||'—'}</span></td>
      <td>${typeof item.value==='number'?item.value.toFixed(3):esc(String(item.value??''))}</td>
      <td>${esc(item.time||'')}</td>
    </tr>`;
  }).join('');
  return `<table><thead><tr>
    <th>#</th><th>地址(dec)</th><th>地址(hex)</th>
    <th class="col-name">点名</th>
    <th>值</th><th>时标</th>
  </tr></thead><tbody>${rows}</tbody></table>`;
}

// ── Param ─────────────────────────────────────────────────────
function renderParam(f, proto) {
  const rows = (f.data||[]).map((item,i) => {
    const addrNum = parseInt(String(item.addr||'').replace(/^0x/i,''),16);
    const name = ptName('para', isNaN(addrNum)?item.addr:addrNum);
    return `<tr>
      <td>${i+1}</td>
      <td class="mono">${esc(item.addr??'')}</td>
      <td class="col-name"><span class="${name?'pname':'pname-none'}">${esc(name)||'—'}</span></td>
      <td>${esc(item.operation??'')}</td>
      <td>${esc(String(item.value??''))}</td>
    </tr>`;
  }).join('');
  return `<table><thead><tr>
    <th>#</th><th>地址</th>
    <th class="col-name">点名</th>
    <th>操作</th><th>值</th>
  </tr></thead><tbody>${rows}</tbody></table>`;
}

// ── Link Frame ────────────────────────────────────────────────
function renderLinkFrame(f) {
  return `<div style="font-family:monospace;font-size:.75rem;color:#334155;padding:8px 12px;background:#f8fafc">
    链路地址: ${esc(String(f.linkAddr??'—'))}
    帧类型: ${esc(f.frameType||'—')}
    方向: ${esc(f.ctrl?.direction||'—')}
    功能码: ${esc(String(f.ctrl?.fc??'—'))} ${esc(f.ctrl?.fcName||'')}
    校验: ${f.csValid?'✓':'✗'}
  </div>`;
}

// ─── Toggle collapse ─────────────────────────────────────────
function toggleBlock(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.toggle('collapsed');
}

// ─── Clear ───────────────────────────────────────────────────
function clearAll() {
  logText = ''; logFileName = ''; parseResult = null;
  document.getElementById('logInput').value = '';
  document.getElementById('logFileInput').value = '';
  document.getElementById('dropZone').classList.remove('has-file');
  document.getElementById('dropIcon').textContent = '📄';
  document.getElementById('dropLabel').textContent = '点击选择 log 文件，或拖拽到此处';
  document.getElementById('dropName').textContent = '';
  checkParseEnable();
  document.getElementById('downloadBtn').disabled = true;
  document.getElementById('statsBar').className = 'stats-bar';
  document.getElementById('output').innerHTML = '<div class="empty-hint">上传 log 文件后点击「解析 Log」按钮开始</div>';
  document.getElementById('parseStatus').textContent = '';
  document.getElementById('errorBox').style.display = 'none';
}

function setDefaultTableBasedOnProtocol(parseResult) {
  if (!PT.ok || !PT.tableNames.length) return;
  
  // 统计协议类型
  const protocols = {};
  parseResult.lines.forEach(line => {
    if (line.type === 'hex' && line.protocol) {
      protocols[line.protocol] = (protocols[line.protocol] || 0) + 1;
    }
  });
  
  // 找出主要协议
  let mainProto = null;
  let maxCount = 0;
  for (const [proto, count] of Object.entries(protocols)) {
    if (count > maxCount) {
      maxCount = count;
      mainProto = proto;
    }
  }
  
  if (!mainProto) return;
  
  const sel = document.getElementById('tableSelect');
  if (!sel) return;
  
  let defaultTable = '';
  if (mainProto === '101') {
    // 101 默认全点表
    defaultTable = '';
  } else if (mainProto === '104') {
    // 104 默认抓发表，优先入网检
    defaultTable = PT.tableNames.includes('入网检') ? '入网检' : (PT.tableNames[0] || '');
  }
  
  if (defaultTable !== sel.value) {
    sel.value = defaultTable;
    rebuildPointMaps(defaultTable || null);
    if (parseResult) renderResult(parseResult);
  }
}

// ─── Download parsed log ─────────────────────────────────────
function downloadLog() {
  if (!parseResult) return;
  const lines = parseResult.lines || [];
  const parts = [];

  lines.forEach(line => {
    if (line.type === 'empty') { parts.push(''); return; }
    if (line.type === 'debug') { parts.push(line.raw); return; }
    if (line.type !== 'hex') { parts.push(line.raw); return; }

    // Original line
    parts.push(line.raw);

    // Append parsed frames summary
    const proto = line.protocol || '104';
    parts.push(`  {${proto}}`);

    (line.frames||[]).forEach(f => {
      if (f.type === 'error') { parts.push(`  [*错误*] ${f.error}`); return; }
      if (f.type === 'link_frame') { parts.push(`  [*链路帧*] 地址:${f.linkAddr} ${f.ctrl?.fcName||''}`); return; }

      const typeLabel = {
        yc:'*遥测*',yx:'*遥信*',soe:'*SOE遥信*',control:'*遥控*',
        param:'*定值*',energy:'*电能量*',fault:'*故障事件*',
        clock:'*对时*',total_call:'*总召*',heartbeat:'*心跳*',
        init:'*初始化*'
      }[f.type] || `*${f.type}*`;

      parts.push(`  [${typeLabel}]`);

      if (f.type === 'yc') {
        parts.push(`  #\t协议\t地址(dec)\t地址(hex)\t点名\t值\t时标`);
        (f.data||[]).forEach((item,i) => {
          const name = ptName('yc', item.addr) || '—';
          parts.push(`  ${i+1}\t${proto}\t${item.addr??''}\t${addrHex(item.addr,proto)}\t${name}\t${item.value??''}\t${item.time||''}`);
        });
      } else if (f.type === 'yx' || f.type === 'soe') {
        parts.push(`  #\t协议\t地址(dec)\t地址(hex)\t点名\t状态\t触发时间`);
        (f.data||[]).forEach((item,i) => {
          const addr = item.addrDec ?? item.addr;
          const name = ptName('yx', addr) || '—';
          parts.push(`  ${i+1}\t${proto}\t${addr??''}\t${addrHex(addr,proto)}\t${name}\t${item.state??''}\t${item.time||item.timestamp||''}`);
        });
      } else if (f.type === 'control') {
        parts.push(`  #\t协议\t地址\t点名\t状态\t操作\t结果`);
        (f.data||[]).forEach((item,i) => {
          const addrDec = parseInt(String(item.addr||'').replace(/^0x/i,''),16);
          const name = ptName('yk', isNaN(addrDec)?item.addr:addrDec) || '—';
          parts.push(`  ${i+1}\t${proto}\t${item.addr??''}\t${name}\t${item.state??''}\t${item.operation??''}\t${item.return??''}`);
        });
      } else if (f.type === 'fault') {
        (f.yx||[]).forEach((item,i) => {
          if (i===0) parts.push(`  #\t协议\t地址(dec)\t点名\t状态\t时标  [遥信]`);
          const name = ptName('yx', item.point) || '—';
          parts.push(`  ${i+1}\t${proto}\t${item.point??''}\t${name}\t${item.state??''}\t${item.time||''}`);
        });
        (f.yc||[]).forEach((item,i) => {
          if (i===0) parts.push(`  #\t协议\t地址(dec)\t点名\t值\t时标  [遥测]`);
          const name = ptName('yc', item.addr||item.point) || '—';
          parts.push(`  ${i+1}\t${proto}\t${item.addr??item.point??''}\t${name}\t${item.value??''}\t${item.time||''}`);
        });
      } else if (f.type === 'energy') {
        parts.push(`  #\t协议\t地址(dec)\t地址(hex)\t点名\t值\t时标`);
        (f.data||[]).forEach((item,i) => {
          const name = ptName('en', item.addr) || '—';
          const val = typeof item.value==='number' ? item.value.toFixed(3) : (item.value??'');
          parts.push(`  ${i+1}\t${proto}\t${item.addr??''}\t${addrHex(item.addr,proto)}\t${name}\t${val}\t${item.time||''}`);
        });
      } else {
        parts.push(`  ${JSON.stringify(f)}`);
      }
    });
    parts.push('');
  });

  const blob = new Blob([parts.join('\n')], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (logFileName.replace(/\.[^.]+$/, '') || 'parsed') + '_parsed.log';
  a.click();
  URL.revokeObjectURL(url);
}

// ── 主题切换 ──
function initializeTheme() {
    const html = document.documentElement;
    const savedTheme = localStorage.getItem('theme');
    
    let theme = savedTheme;
    if (!theme) {
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        theme = prefersDark ? 'dark' : 'light';
    }
    
    applyTheme(theme);
    setupThemeToggle();
    
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
        if (!localStorage.getItem('theme')) {
            applyTheme(e.matches ? 'dark' : 'light');
        }
    });
}

function applyTheme(theme) {
    const html = document.documentElement;
    if (theme === 'dark') {
        html.classList.add('dark-theme');
        html.classList.remove('light-theme');
    } else {
        html.classList.add('light-theme');
        html.classList.remove('dark-theme');
    }
}

function toggleTheme() {
    const html = document.documentElement;
    const isDark = html.classList.contains('dark-theme');
    const newTheme = isDark ? 'light' : 'dark';
    
    localStorage.setItem('theme', newTheme);
    applyTheme(newTheme);
    updateThemeButton();
}

function setupThemeToggle() {
    const btn = document.getElementById('themeToggle');
    if (btn) {
        btn.onclick = (e) => {
            e.preventDefault();
            toggleTheme();
        };
        updateThemeButton();
    }
}

function updateThemeButton() {
    const btn = document.getElementById('themeToggle');
    if (!btn) return;
    const isDark = document.documentElement.classList.contains('dark-theme');
    btn.innerHTML = isDark ? '☀️ 亮色' : '🌙 暗色';
}

document.addEventListener('DOMContentLoaded', initializeTheme);
if (document.readyState !== 'loading') {
    initializeTheme();
}
</script>
